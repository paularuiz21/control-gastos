/* ── FIREBASE HELPERS ─────────────────────────────────────── */
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

// Devuelve {ok:true, data} (data puede ser null si el doc no existe — usuario nuevo)
// o {ok:false} si hubo error de red. Distinguirlos es clave: ante un error NO se debe
// habilitar el guardado, porque se pisaría Firestore con un estado incompleto.
const fsLoad = async (uid) => {
  if (!fbDb) return {ok: true, data: null};
  try {
    const snap = await fbDb.collection("users").doc(uid).get();
    return {ok: true, data: snap.exists ? snap.data() : null};
  } catch(e) { console.warn("fsLoad error:", e); return {ok: false}; }
};

// Reintenta fsLoad hasta 4 veces con espera creciente (0s, 1s, 2s, 4s)
const fsLoadConReintentos = async (uid) => {
  const esperas = [0, 1000, 2000, 4000];
  for (let i = 0; i < esperas.length; i++) {
    if (esperas[i]) await new Promise(r => setTimeout(r, esperas[i]));
    const r = await fsLoad(uid);
    if (r.ok) return r;
  }
  return {ok: false};
};

const fsSave = debounce(async (uid, data) => {
  if (!fbDb) return;
  // merge:true para no sobreescribir campos no incluidos (ej: groupId si es null por error de carga)
  try {
    await fbDb.collection("users").doc(uid).set(data, {merge: true});
    window.dispatchEvent(new CustomEvent('fsSaveOk', {detail: Date.now()}));
  }
  catch(e) {
    console.warn("fsSave error:", e);
    window.dispatchEvent(new CustomEvent('fsSaveErr', {detail: e.message||"Error de red"}));
  }
}, 1500);

/* ── FIREBASE GROUP HELPERS ───────────────────────────────── */
const fsCreateGroup = async (uid, displayName, email) => {
  if (!fbDb) return null;
  try {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let token = '';
    for(let i=0; i<8; i++) token += chars[Math.floor(Math.random()*chars.length)];
    const ref = fbDb.collection("groups").doc();
    const data = {
      inviteToken: token,
      memberUids:  [uid],
      members:     [{uid, displayName: displayName||email||"Usuario", email: email||""}],
      catsComp:    CATS_COMP_DEFAULT,
      presupComp:  {},
      gastosComp:  [],
      pagos:       [],
    };
    await ref.set(data);
    return {groupId: ref.id, ...data};
  } catch(e) { console.warn("fsCreateGroup error:", e); return null; }
};

const fsJoinGroup = async (token, uid, displayName, email) => {
  if (!fbDb) return null;
  try {
    const snap = await fbDb.collection("groups")
      .where("inviteToken","==",token.toUpperCase().trim()).limit(1).get();
    if (snap.empty) return "notfound";
    const doc = snap.docs[0];
    const data = doc.data();
    if ((data.memberUids||[]).includes(uid)) return {groupId: doc.id, ...data};
    if ((data.memberUids||[]).length >= 2) return "full";
    const newMember = {uid, displayName: displayName||email||"Usuario", email: email||""};
    const updated = {
      ...data,
      memberUids: [...(data.memberUids||[]), uid],
      members:    [...(data.members||[]),    newMember],
    };
    await doc.ref.set(updated);
    return {groupId: doc.id, ...updated};
  } catch(e) { console.warn("fsJoinGroup error:", e); return null; }
};

/* ── HELPERS ──────────────────────────────────────────────── */
const today = () => new Date().toISOString().split("T")[0];

const getCierre = (t, fecha) => {
  try {
    if (!t || t.cierre === null || t.cierre === undefined) return 19;
    if (typeof t.cierre === "number") return t.cierre;
    if (typeof t.cierre === "object") {
      const mk = (fecha||"").substring(0,7);
      return t.cierre[mk] || t.cierre.default || 19;
    }
    return 19;
  } catch(e) { return 19; }
};

const fechaImpacto = (fecha, tid, tarjetas) => {
  if (!tid) return fecha;
  const t = tarjetas.find(t=>t.id===tid);
  if (!t) return fecha;
  const d = new Date(fecha+"T12:00:00");
  const cierre = getCierre(t, fecha);
  const x = d.getDate()<=cierre ? 1 : 2;
  return new Date(d.getFullYear(), d.getMonth()+x, 1).toISOString().split("T")[0];
};

const impactoInfo = (fecha, tid, tarjetas) => {
  if (!tid) return null;
  const t = tarjetas.find(t=>t.id===tid);
  if (!t) return null;
  const d = new Date(fecha+"T12:00:00");
  const cierre = getCierre(t, fecha);
  const x = d.getDate() <= cierre ? 1 : 2;
  return {mes:MESES[(d.getMonth()+x)%12], cerro:x===2, cierre};
};

/* ── STORAGE HELPERS ──────────────────────────────────────── */
const load = (key, def) => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch { return def; } };
const save = (key, val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} };

/* ═══════════════════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════════════════ */
function LoginScreen({ onGuest }) {
  const [mode,    setMode]    = useState("menu");
  const [email,   setEmail]   = useState("");
  const [pass,    setPass]    = useState("");
  const [err,     setErr]     = useState("");
  const [loading, setLoading] = useState(false);


  const btnBase = {
    width:"100%", padding:"13px 16px", borderRadius:10, border:"none",
    cursor:"pointer", fontFamily:sans, fontWeight:700, fontSize:14,
    display:"flex", alignItems:"center", justifyContent:"center",
    gap:8, marginBottom:10, transition:"opacity .15s"
  };
  const inputStyle = {
    width:"100%", padding:"12px 14px", borderRadius:10, marginBottom:10,
    border:`1px solid ${C.rule}`, background:C.paper, fontFamily:sansR,
    fontSize:14, color:C.ink, outline:"none"
  };

  const withLoading = async (fn) => {
    setLoading(true); setErr("");
    try { await fn(); }
    catch(e) { setErr(e.message || "Error al ingresar"); setLoading(false); }
  };

  const loginGoogle = () => withLoading(async () => {
    const p = new firebase.auth.GoogleAuthProvider();
    await fbAuth.signInWithPopup(p);
  });

  const loginEmail = () => withLoading(async () => {
    if (!email || !pass) throw new Error("Completá email y contraseña");
    try {
      await fbAuth.signInWithEmailAndPassword(email, pass);
    } catch(e) {
      if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/invalid-email") {
        await fbAuth.createUserWithEmailAndPassword(email, pass);
      } else throw e;
    }
  });

  return (
    <div style={{minHeight:"100vh", background:C.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:24}}>
      <div style={{width:"100%", maxWidth:360}}>

        {/* Header */}
        <div style={{textAlign:"center", marginBottom:36}}>
          <div style={{fontFamily:serif, fontSize:28, fontWeight:900, color:"#F4F0EB", letterSpacing:"-0.01em", lineHeight:1.2}}>
            Seguimiento de gastos y presupuestos
          </div>
          <div style={{fontFamily:sans, fontSize:12, color:C.mid, marginTop:10, letterSpacing:"0.08em"}}>
            by Pauli
          </div>
        </div>

        {mode === "menu" && (
          <>
            <button onClick={loginGoogle} disabled={loading}
              style={{...btnBase, background:C.accent, color:"#fff", opacity: loading ? .6 : 1}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Continuar con Google
            </button>

            <button onClick={() => setMode("email")} disabled={loading}
              style={{...btnBase, background:C.paper, color:C.ink, border:`1px solid ${C.rule}`}}>
              <Icon name="receipt" size={16} color={C.ink}/>
              Continuar con Email
            </button>

            <div style={{textAlign:"center", margin:"8px 0 16px", color:C.faint, fontSize:12, letterSpacing:"0.1em"}}>
              ── o ──
            </div>

            <button onClick={onGuest}
              style={{...btnBase, background:"transparent", color:C.mid, border:`1px solid ${C.rule}`, fontSize:12}}>
              <Icon name="download" size={14} color={C.mid}/>
              Solo en este dispositivo (sin sincronización)
            </button>

            {err && <div style={{color:C.red, fontSize:12, textAlign:"center", marginTop:8}}>{err}</div>}
          </>
        )}

        {mode === "email" && (
          <>
            <div style={{fontFamily:sans, fontSize:13, color:C.mid, marginBottom:14}}>
              Si no tenés cuenta, se crea automáticamente al ingresar.
            </div>
            <input value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="Email" type="email" style={inputStyle}/>
            <input value={pass} onChange={e=>setPass(e.target.value)}
              placeholder="Contraseña" type="password" style={inputStyle}
              onKeyDown={e => e.key==="Enter" && loginEmail()}/>
            {err && <div style={{color:C.red, fontSize:12, marginBottom:10}}>{err}</div>}

            <button onClick={loginEmail} disabled={loading}
              style={{...btnBase, background:C.accent, color:"#fff", opacity: loading ? .6 : 1}}>
              {loading ? "Ingresando…" : "Ingresar / Crear cuenta"}
            </button>
            <button onClick={() => { setMode("menu"); setErr(""); }}
              style={{...btnBase, background:"transparent", color:C.mid, border:`1px solid ${C.rule}`}}>
              Volver
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════ */
function App() {
  /* ── AUTH + SYNC STATE ── */
  // Si Firebase no está configurado, ir directo a modo invitado
  const [authUser,   setAuthUser]   = useState(FB_CONFIGURED ? null : false);
  const [isGuest,    setIsGuest]    = useState(!FB_CONFIGURED || localStorage.getItem("v3_guest") === "1");
  const [syncReady,  setSyncReady]  = useState(!FB_CONFIGURED);
  const [loadFailed,  setLoadFailed]  = useState(false); // carga inicial falló tras reintentos
  const [loadAttempt, setLoadAttempt] = useState(0);     // contador para reintentar manualmente

  const [gastos, setGastos] = useState(() => load("v6_gastos", []));
  const gastosRef = React.useRef([]);
  useEffect(() => { gastosRef.current = gastos; }, [gastos]);
  const PAPELERA_TTL = 30 * 24 * 60 * 60 * 1000; // 30 días en ms
  const [gastosEliminados, setGastosEliminados] = useState(() => {
    const stored = load("v1_gastos_eliminados", []);
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    return stored.filter(e => (e.deletedAt||0) > cutoff);
  });
  const [syncError,    setSyncError]    = useState(null);  // null | string (mensaje de error)
  const [lastSyncedAt, setLastSyncedAt] = useState(null);  // timestamp último guardado OK
  const [cats, setCats] = useState(() => {
    const stored = load("v8_cats", null);
    // Always start from CATS_DEFAULT as base, then apply user customizations on top
    const base = CATS_DEFAULT;
    if (!stored) return base;
    // Keep user label/tipo/icon edits for existing cats, add new defaults, dedupe
    const seen = new Set();
    const merged = [...stored, ...base].filter(c => {
      if (seen.has(c.id)) return false;
      seen.add(c.id);
      return true;
    });
    return merged.sort((a,b)=>a.label.localeCompare(b.label,"es"));
  });
  const [tarjetas, setTarjetas] = useState(() => {
    const stored = load("v5_tarjetas", null);
    const base = stored || TARJETAS_DEFAULT;
    // Migrate: ensure cierre is always an object
    return base.map(t => ({
      ...t,
      cierre: (typeof t.cierre === "object" && t.cierre !== null)
        ? t.cierre
        : {default: typeof t.cierre === "number" ? t.cierre : 19}
    }));
  });
  const [catsIngreso, setCatsIngreso] = useState(() => load("v1_cats_ingreso", CATS_INGRESO));
  const [catsAhorro,  setCatsAhorro]  = useState(() => load("v1_cats_ahorro",  CATS_AHORRO));
  const [presupComp, setPresupComp] = useState(() => load("v5_presup_comp", {}));
  const [presup, setPresup] = useState(() => load("v6_presup", {}));

  const [tab,       setTab]       = useState("cargar");
  const [filtroMes, setFiltroMes] = useState(new Date().getMonth());
  const [filtroCat, setFiltroCat] = useState("Todas");
  const [saved,     setSaved]     = useState(false);
  const [editando,  setEditando]  = useState(null); // gasto id being edited
  const [modal,     setModal]     = useState(null); // "cats" | "tarjetas" | "presup" | "editGasto"
  const [reporteImg, setReporteImg] = useState(null);
  const [vistaResumen, setVistaResumen] = useState("personal"); // "personal" | "compartido"
  const [vistaRep,     setVistaRep]     = useState("personal"); // reporte anual toggle
  const [objAhorro,    setObjAhorro]    = useState(() => load("v5_obj_ahorro", {}));
  const [anthropicKey, setAnthropicKey] = useState(() => localStorage.getItem("v1_anthropic_key") || "");
  const [scanLoading,  setScanLoading]  = useState(false);
  const [privado,    setPrivado]    = useState(false);
  const [balMesesAb, setBalMesesAb] = useState(()=>new Set([new Date().toISOString().slice(0,7)]));
  const [recurPinnedRaw,  setRecurPinnedRaw]  = useState(()=>load("v1_recur_pinned",  null));
  const [recurPinnedCRaw, setRecurPinnedCRaw] = useState(()=>load("v1_recur_pinned_c", null));
  const [recurEdit,  setRecurEdit]  = useState(false);
  const [recurEditC, setRecurEditC] = useState(false);

  /* ── GROUP STATE ── */
  const [groupId,           setGroupId]           = useState(null);
  const [groupData,         setGroupData]         = useState(null);
  const [groupReady,        setGroupReady]        = useState(false);
  const [pendingInvite,     setPendingInvite]     = useState(() => {
    const fromUrl = new URLSearchParams(window.location.search).get('invite');
    if (fromUrl) return fromUrl;
    const fromStorage = localStorage.getItem("v3_pending_invite");
    if (fromStorage) { localStorage.removeItem("v3_pending_invite"); return fromStorage; }
    return null;
  });
  const [showJoinPrompt,    setShowJoinPrompt]    = useState(false);
  const [gastosCompSynced,  setGastosCompSynced]  = useState([]);
  const gastosCompSyncedRef  = React.useRef([]);
  const prevGCFingerprintRef = React.useRef("");
  const prevGCIdsRef         = React.useRef(new Set()); // IDs vistos en el último snapshot válido
  useEffect(() => { gastosCompSyncedRef.current = gastosCompSynced; }, [gastosCompSynced]);
  const [undoData,   setUndoData]   = useState(null); // {gasto, gcEntry?, gcId?}
  const undoTimerRef = React.useRef(null);

  /* ── BALANCE TAB LOCAL STATE ── */
  const [balModal,    setBalModal]    = useState(null); // "gasto"|"pago"|"cats"
  const [balEditGC,   setBalEditGC]   = useState(null);
  const [balInvInput, setBalInvInput] = useState("");
  const [balJoining,  setBalJoining]  = useState(false);
  const [balJoinErr,  setBalJoinErr]  = useState("");
  const [balCreating, setBalCreating] = useState(false);
  const [balCopied,   setBalCopied]   = useState(false);

  const FORM_INIT = {
    fecha:today(), gasto:cats[0]?.id||"", observacion:"",
    tipo_mov:"Gasto", via:"Débito", tarjeta:"",
    monto_dividir:"", monto:"", dividir:false,
    divTipo:"mitad", divValor:"",
    moneda:"ARS", tcambio:"", sumar_balance:false, quienPago:"yo",
  };
  const [form, setForm] = useState(FORM_INIT);

  useEffect(() => { save("v6_gastos",       gastos);            }, [gastos]);
  useEffect(() => { save("v1_gastos_eliminados", gastosEliminados); }, [gastosEliminados]);
  useEffect(() => { save("v8_cats",         cats);        }, [cats]);
  useEffect(() => { save("v1_cats_ingreso", catsIngreso); }, [catsIngreso]);
  useEffect(() => { save("v1_cats_ahorro",  catsAhorro);  }, [catsAhorro]);
  useEffect(() => { save("v5_tarjetas",     tarjetas);    }, [tarjetas]);
  useEffect(() => { save("v6_presup",       presup);      }, [presup]);
  useEffect(() => { save("v5_presup_comp",  presupComp);  }, [presupComp]);
  useEffect(() => { save("v5_obj_ahorro",   objAhorro);   }, [objAhorro]);

  /* ── FIREBASE: escuchar eventos de guardado ── */
  useEffect(() => {
    const onOk  = (e) => { setSyncError(null); setLastSyncedAt(e.detail); };
    const onErr = (e) => { setSyncError(e.detail); };
    window.addEventListener('fsSaveOk',  onOk);
    window.addEventListener('fsSaveErr', onErr);
    return () => { window.removeEventListener('fsSaveOk', onOk); window.removeEventListener('fsSaveErr', onErr); };
  }, []);

  /* ── FIREBASE: escuchar cambios de sesión ── */
  useEffect(() => {
    if (!FB_CONFIGURED) return;
    const unsub = fbAuth.onAuthStateChanged(u => setAuthUser(u || false));
    return unsub;
  }, []);

  /* ── FIREBASE: cargar datos de Firestore al iniciar sesión ── */
  useEffect(() => {
    if (!FB_CONFIGURED || isGuest) { setSyncReady(true); return; }
    if (!authUser) return;
    setSyncReady(false);
    setLoadFailed(false);
    fsLoadConReintentos(authUser.uid).then(r => {
      if (!r.ok) {
        // Error de red tras 4 intentos: NO habilitar el guardado.
        // Habilitarlo pisaría Firestore con un estado incompleto (la causa
        // original de la pérdida de gastos). El usuario puede reintentar.
        setLoadFailed(true);
        return;
      }
      const data = r.data;
      if (data) {
        if (Array.isArray(data.gastos)) {
          // Merge Firestore + localStorage: nunca pisar datos locales buenos con menos datos de Firestore.
          // Si Firestore tiene gastos que no están en localStorage → se agregan.
          // Si localStorage tiene gastos que Firestore no tiene → se recuperan (evita pérdida silenciosa).
          const localGastos = load("v6_gastos", []);
          const mergedById = new Map();
          // Primero localStorage (base confiable), luego Firestore (puede tener versiones más recientes)
          localGastos.forEach(g => mergedById.set(g.id, g));
          data.gastos.forEach(g => mergedById.set(g.id, g));
          const merged = Array.from(mergedById.values());
          const recovered = merged.length - data.gastos.length;
          if (recovered > 0) console.warn(`[sync] Recuperados ${recovered} gastos de localStorage que faltaban en Firestore`);
          // Deduplicar por si acaso
          const seen = new Set();
          setGastos(merged.filter(g => { if (seen.has(g.id)) return false; seen.add(g.id); return true; }));
        }
        if (Array.isArray(data.cats) && data.cats.length > 0)   setCats(data.cats);
        if (Array.isArray(data.catsIngreso))                     setCatsIngreso(data.catsIngreso);
        if (Array.isArray(data.catsAhorro))                      setCatsAhorro(data.catsAhorro);
        if (Array.isArray(data.tarjetas))                        setTarjetas(data.tarjetas);
        if (data.presup     && typeof data.presup     === "object") setPresup(data.presup);
        if (data.presupComp && typeof data.presupComp === "object") setPresupComp(data.presupComp);
        if (data.objAhorro  && typeof data.objAhorro  === "object") setObjAhorro(data.objAhorro);
        if (data.groupId)                                            setGroupId(data.groupId);
        if (Array.isArray(data.gastosCompSynced)) {
          setGastosCompSynced(data.gastosCompSynced);
          gastosCompSyncedRef.current = data.gastosCompSynced;
        }
        if (Array.isArray(data.gastosEliminados)) {
          const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
          setGastosEliminados(data.gastosEliminados.filter(e => (e.deletedAt||0) > cutoff));
        }
      }
      setSyncReady(true);
    });
  }, [authUser, isGuest, loadAttempt]);

  /* ── FIREBASE: guardar en Firestore cuando cambia cualquier estado ── */
  useEffect(() => {
    if (!authUser || isGuest || !syncReady) return;
    // groupId solo se incluye si está seteado: evita que un error de carga lo borre en Firestore
    const dataToSave = { gastos, cats, catsIngreso, catsAhorro, tarjetas, presup, presupComp, objAhorro, gastosCompSynced, gastosEliminados };
    if (groupId) dataToSave.groupId = groupId;
    fsSave(authUser.uid, dataToSave);
  }, [gastos, cats, tarjetas, presup, presupComp, objAhorro, groupId, gastosCompSynced, gastosEliminados, syncReady]);

  /* ── FIREBASE: escuchar grupo en tiempo real ── */
  useEffect(() => {
    if (!groupId || !fbDb || isGuest) return;
    setGroupReady(false);
    const unsub = fbDb.collection("groups").doc(groupId).onSnapshot(snap => {
      if (snap.exists) setGroupData(snap.data());
      setGroupReady(true);
    }, err => { console.warn("group snapshot error:", err); setGroupReady(true); });
    return unsub;
  }, [groupId]);

  /* ── AUTO-SYNC: gastos del grupo → movimientos personales ── */
  useEffect(() => {
    if (!groupData || !authUser || !cats.length) return;
    const myUid     = authUser.uid;
    const catsComp  = groupData?.catsComp?.length?groupData.catsComp:CATS_COMP_DEFAULT;
    const allGC     = groupData.gastosComp || [];
    const currentGCIds  = new Set(allGC.map(g => g.id));
    const currentSynced = gastosCompSyncedRef.current;

    // Helper: reconstruye los campos del gasto personal desde una entrada gastosComp
    const buildFields = (g) => {
      const isMyEntry = g.pagadoPor === myUid;
      const myShare   = isMyEntry ? g.montoMio : g.montoOtro;
      const viaFinal  = isMyEntry ? (g.via || "Efectivo") : "Balance";
      const fi        = (isMyEntry && g.tarjeta) ? fechaImpacto(g.fecha, g.tarjeta, tarjetas) : g.fecha;
      const catLabel  = catsComp.find(c=>c.id===g.catId)?.label?.toLowerCase()||"";
      const baseId    = (g.catId||"").replace(/^comp_/,"");
      const catMatch  = cats.find(c=>c.id===baseId)
        || cats.find(c=>c.label.toLowerCase()===catLabel)
        || cats.find(c=>c.id==="extraordinarios")
        || cats[0];
      return {
        fecha: g.fecha, fecha_impacto: fi,
        gasto: catMatch?.id, observacion: g.observacion||"",
        tipo_mov:"Gasto", tipo:catMatch?.tipo||"Discrecional",
        via: viaFinal, tarjeta:(isMyEntry&&g.tarjeta)?g.tarjeta:null,
        monto_dividir:null, monto:myShare,
        moneda:"ARS", monto_original:null, tcambio:null,
      };
    };

    // 1. IDs eliminados de Firestore
    // Solo marcamos como eliminado un ID si:
    //   a) estaba sincronizado Y
    //   b) apareció en un snapshot anterior (prevGCIdsRef) Y
    //   c) ya no está en el snapshot actual
    // Esto evita borrados falsos cuando Firestore devuelve temporalmente gastosComp vacío
    const deletedIds = new Set(
      currentSynced.filter(id => prevGCIdsRef.current.has(id) && !currentGCIds.has(id))
    );
    // Actualizar los IDs vistos (solo si el snapshot tiene datos o nunca tuvimos datos)
    if (allGC.length > 0 || prevGCIdsRef.current.size === 0) {
      prevGCIdsRef.current = currentGCIds;
    }

    // 2. Entradas nuevas (nunca sincronizadas)
    const unsynced = allGC.filter(g => !currentSynced.includes(g.id));

    // 3. Entradas ya sincronizadas que pueden haber cambiado
    const syncedEntries = allGC.filter(g => currentSynced.includes(g.id));
    const updatesMap    = new Map(syncedEntries.map(g => [g.id, buildFields(g)]));

    // Fingerprint para detectar si los datos realmente cambiaron (evita setGastos en cada snapshot)
    const gcFingerprint = allGC.map(g=>`${g.id}:${g.fecha}:${g.monto}:${g.observacion||""}`).join("|");
    const gcChanged     = gcFingerprint !== prevGCFingerprintRef.current;
    prevGCFingerprintRef.current = gcFingerprint;

    if (!deletedIds.size && !unsynced.length && !gcChanged) return;

    // Antes de eliminar, mover a papelera los gastos que van a desaparecer
    if (deletedIds.size > 0) {
      const toDelete = gastosRef.current.filter(g => {
        const numId = typeof g.id === "string" && g.id.startsWith("gc_")
          ? Number(g.id.slice(3)) : (typeof g.id === "number" ? g.id : null);
        return deletedIds.has(numId);
      });
      if (toDelete.length > 0) {
        const now = Date.now();
        setGastosEliminados(prev => [
          ...toDelete.map(g => ({gasto:g, deletedAt:now, reason:"sync_auto"})),
          ...prev.filter(e => !toDelete.some(d => d.id === e.gasto.id))
        ]);
      }
    }

    setGastos(gs => {
      // Quitar gastos cuya entrada fue eliminada de Firestore
      let result = gs.filter(g => {
        const numId = typeof g.id === "string" && g.id.startsWith("gc_")
          ? Number(g.id.slice(3)) : (typeof g.id === "number" ? g.id : null);
        return !deletedIds.has(numId);
      });
      // Actualizar gastos existentes con datos de Firestore
      result = result.map(g => {
        const isGC  = typeof g.id === "string" && g.id.startsWith("gc_");
        const numId = isGC ? Number(g.id.slice(3)) : (typeof g.id === "number" ? g.id : null);
        if (numId && updatesMap.has(numId)) {
          const f = updatesMap.get(numId);
          if (isGC) {
            // Gasto auto-sincronizado: reemplazar completamente
            return {...f, id: g.id};
          } else {
            // Gasto propio (registrado por mí): solo actualizar campos que vienen del balance
            // (preservar monto_dividir, moneda, tcambio, via/tarjeta originales)
            return {...g, fecha:f.fecha, fecha_impacto:f.fecha_impacto,
              observacion:f.observacion, gasto:f.gasto, monto:f.monto};
          }
        }
        return g;
      });
      // Agregar gastos de entradas nuevas (sin duplicar IDs que ya existen)
      const existingIds = new Set(result.map(g => g.id));
      const newPersonal = unsynced
        .map(g => ({...buildFields(g), id:"gc_"+g.id}))
        .filter(g => !existingIds.has(g.id));

        }
      } : {})
    };
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
    a.download=`backup_completo_${new Date().toISOString().split("T")[0]}.json`; a.click();

  const restaurarDesdeBackup = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data.gastos)) { alert("Archivo inválido: no contiene gastos."); return; }
        const existingIds = new Set(gastos.map(g => String(g.id)));
        // Excluir gc_ (los maneja auto-sync solo) y solo incluir gastos propios
        const nuevos = data.gastos.filter(g =>
          !existingIds.has(String(g.id)) &&
          !(typeof g.id === "string" && g.id.startsWith("gc_"))
        );
        if (nuevos.length === 0) {
          alert("No hay gastos nuevos para recuperar — todos ya están en la app.");
          return;
        }
        setGastos(gs => {
          const merged = [...nuevos, ...gs];
          const seen = new Set();
          return merged.filter(g => { if (seen.has(g.id)) return false; seen.add(g.id); return true; });
        });
        alert(`✓ Recuperados ${nuevos.length} gastos del backup.\n${existingIds.size} ya existían y no fueron modificados.`);
      } catch(err) { alert("Error al leer el archivo: " + err.message); }
    };
    reader.readAsText(file);
  };

      gastoMesCat[c.id]    = gastos.filter(g => {
        const ref = g.fecha_impacto||g.fecha;
        return g.gasto===c.id && g.tipo_mov==="Gasto" && new Date(ref+"T12:00:00").getMonth()===filtroMes;
      }).reduce((s,g)=>s+g.monto,0);
      gastoAnualCat[c.id]  = gastos.filter(g=>g.gasto===c.id&&g.tipo_mov==="Gasto").reduce((s,g)=>s+g.monto,0);
      presupAnualCat[c.id] = Object.values(presup).reduce((s,m)=>s+(m[c.id]||0),0);
    });

    const totalGMes     = Object.values(gastoMesCat).reduce((s,v)=>s+v,0);
    const totalPresupMes= Object.values(presupMesRep).reduce((s,v)=>s+v,0);
    const totalGAnual   = Object.values(gastoAnualCat).reduce((s,v)=>s+v,0);
    const totalPAnual   = Object.values(presupAnualCat).reduce((s,v)=>s+v,0);
    const rafAnual      = totalPAnual - totalGAnual;

    const catsWithData = cats.filter(c=>presupAnualCat[c.id]>0||gastoAnualCat[c.id]>0||gastoMesCat[c.id]>0);
    const rowH = 62*scale;
    const headerH = 220*scale;
    const secH = 28*scale;
    const footerH = 50*scale;
    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = headerH + secH + catsWithData.length*rowH + secH + footerH + 20*scale;
    const ctx = canvas.getContext("2d");

    // BG
    ctx.fillStyle = BG;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // DARK HEADER
    ctx.fillStyle = DARK;
    ctx.fillRect(0,0,W,headerH);

    // Title
    ctx.fillStyle = "#F4F0EB";
    ctx.font = `900 ${20*scale}px Georgia,serif`;
    ctx.fillText("Control de Gastos", PAD, 38*scale);
    ctx.fillStyle = "#6B6460";
    ctx.font = `${9*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText(`SEGUIMIENTO 2026 · ${MESES[filtroMes].toUpperCase()}`, PAD, 54*scale);

    // ── MES boxes
    ctx.fillStyle = "#A09890";
    ctx.font = `700 ${8*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText(`MES · ${MESES[filtroMes].toUpperCase()}`, PAD, 72*scale);

    const mesBoxes = [
      {label:"GASTADO", value:fmtN(totalGMes), col:RED},
      {label:"PRESUPUESTO", value:fmtN(totalPresupMes), col:BLUE},
      {label:"DESVÍO", value:fmtN(totalGMes-totalPresupMes), col:totalGMes<=totalPresupMes?GREEN:RED},
    ];
    const bw=(W-PAD*2-16*scale)/3;
    mesBoxes.forEach((b,i)=>{
      const bx=PAD+i*(bw+8*scale), by=80*scale;
      ctx.fillStyle=PAPER; ctx.beginPath(); ctx.roundRect(bx,by,bw,56*scale,7*scale); ctx.fill();
      ctx.fillStyle=b.col; ctx.fillRect(bx,by,3*scale,56*scale);
      ctx.fillStyle=MID; ctx.font=`700 ${7.5*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(b.label,bx+9*scale,by+16*scale);
      ctx.fillStyle=b.col; ctx.font=`900 ${12*scale}px Georgia,serif`;
      ctx.fillText(b.value,bx+9*scale,by+38*scale);
    });

    // ── ANUAL boxes
    ctx.fillStyle = "#A09890";
    ctx.font = `700 ${8*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText("ACUMULADO ANUAL", PAD, 152*scale);

    const anualBoxes = [
      {label:"GASTADO AÑO", value:fmtN(totalGAnual), col:RED},
      {label:"PRESUP. AÑO", value:fmtN(totalPAnual), col:BLUE},
      {label:"RAF RESTANTE", value:fmtN(rafAnual), col:rafAnual>=0?GREEN:RED},
    ];
    anualBoxes.forEach((b,i)=>{
      const bx=PAD+i*(bw+8*scale), by=160*scale;
      ctx.fillStyle=PAPER; ctx.beginPath(); ctx.roundRect(bx,by,bw,50*scale,7*scale); ctx.fill();
      ctx.fillStyle=b.col; ctx.fillRect(bx,by,3*scale,50*scale);
      ctx.fillStyle=MID; ctx.font=`700 ${7.5*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(b.label,bx+9*scale,by+14*scale);
      ctx.fillStyle=b.col; ctx.font=`900 ${11*scale}px Georgia,serif`;
      ctx.fillText(b.value,bx+9*scale,by+34*scale);
    });

    // ── SECTION: DESGLOSE POR CATEGORÍA
    let y = headerH;
    ctx.fillStyle="#2A2724"; ctx.fillRect(0,y,W,secH);
    ctx.fillStyle=MID; ctx.font=`700 ${8.5*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText("CATEGORÍA", PAD, y+18*scale);
    ctx.textAlign="right";
    ctx.fillText("MES", W-PAD-160*scale, y+18*scale);
    ctx.fillText("ANUAL", W-PAD-76*scale, y+18*scale);
    ctx.fillText("RAF", W-PAD, y+18*scale);
    ctx.textAlign="left";
    y += secH;

    catsWithData.forEach((c,i)=>{
      const gMes  = gastoMesCat[c.id]||0;
      const gAnu  = gastoAnualCat[c.id]||0;
      const pAnu  = presupAnualCat[c.id]||0;
      const pMes  = presupMesRep[c.id]||0;
      const raf2  = pAnu - gAnu;
      const over  = raf2<0;
      const isI   = c.tipo==="Indispensable";
      const ry    = y + i*rowH;

      if(i%2===0){ctx.fillStyle=PAPER;}else{ctx.fillStyle="#F8F5F1";}
      ctx.fillRect(0,ry,W,rowH);

      // accent
      ctx.fillStyle=isI?ACCENT:BLUE;
      ctx.fillRect(0,ry,3*scale,rowH);

      // name
      ctx.fillStyle=DARK; ctx.font=`700 ${11*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(c.label,PAD,ry+16*scale);

      // tipo
      ctx.fillStyle=isI?ACCENT:BLUE; ctx.font=`600 ${7*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(isI?"INDISPENSABLE":"DISCRECIONAL",PAD,ry+28*scale);

      // progress bar anual
      if(pAnu>0){
        const bW2=140*scale, bX2=W-PAD-bW2-168*scale, bY2=ry+34*scale;
        ctx.fillStyle=RULE; ctx.beginPath(); ctx.roundRect(bX2,bY2,bW2,4*scale,2*scale); ctx.fill();
        ctx.fillStyle=over?RED:GREEN; ctx.beginPath();
        ctx.roundRect(bX2,bY2,bW2*Math.min(gAnu/pAnu,1),4*scale,2*scale); ctx.fill();
      }

      // numbers
      ctx.textAlign="right";
      ctx.font=`900 ${10.5*scale}px Georgia,serif`;
      ctx.fillStyle=gMes>0?(pMes>0&&gMes>pMes?RED:DARK):MID;
      ctx.fillText(gMes>0?fmtN(gMes):"—",W-PAD-160*scale,ry+20*scale);
      ctx.fillStyle=gAnu>0?RED:MID;
      ctx.fillText(gAnu>0?fmtN(gAnu):"—",W-PAD-76*scale,ry+20*scale);
      ctx.fillStyle=pAnu>0?(over?RED:GREEN):MID;
      ctx.fillText(pAnu>0?fmtN(raf2):"—",W-PAD,ry+20*scale);
      ctx.textAlign="left";

      // separator
      ctx.fillStyle=RULE; ctx.fillRect(PAD,ry+rowH-1,W-PAD*2,1);
    });

    // FOOTER
    const fy2 = y + catsWithData.length*rowH;
    ctx.fillStyle=DARK; ctx.fillRect(0,fy2,W,footerH+20*scale);
    ctx.fillStyle="#6B6460"; ctx.font=`${8.5*scale}px 'Barlow Condensed',sans-serif`;
    ctx.textAlign="center";
    ctx.fillText(`Control de Gastos · 2026 · ${new Date().toLocaleDateString("es-AR")}`,W/2,fy2+28*scale);
    ctx.textAlign="left";

    setReporteImg(canvas.toDataURL("image/png"));
  };


  /* ── MODAL: GASTO COMPARTIDO ── */
  const ModalGastoComp = ({onClose, editItem=null}) => {
    const myUid   = authUser?.uid;
    const partner = groupData?.members?.find(m=>m.uid!==myUid);
    const catsComp = groupData?.catsComp || CATS_COMP_DEFAULT;
    const [fg, setFg] = useState({
      fecha: today(),
      catId: catsComp[0]?.id||"",
      observacion: "",
      monto: "",
      pagadoPor: myUid||"",
      splitType: "percent",
      splitValue: 50,
      via: "Efectivo",
      tarjeta: "",
      ...(editItem||{}),
    });
    const montoN    = parseFloat(fg.monto)||0;
    const montoOtro = fg.splitType==="percent"
      ? montoN*(100-fg.splitValue)/100
      : (parseFloat(fg.splitValue)||0);
    const montoMio  = montoN - montoOtro;
    const otherName = partner?.displayName||"Otra persona";
    const isPayer   = fg.pagadoPor === myUid;

    const guardarComp = () => {
      if (!montoN||!groupId) return;
      const entryId  = editItem?.id || Date.now();
      const myShare  = isPayer ? montoMio : montoOtro; // mi porción real
      const viaFinal = !isPayer
        ? "Balance"
        : (fg.tarjeta ? (tarjetas.find(t=>t.id===fg.tarjeta)?.label||"Crédito") : fg.via);
      const fi = (isPayer && fg.tarjeta) ? fechaImpacto(fg.fecha, fg.tarjeta, tarjetas) : fg.fecha;

      // Marcar como sincronizado ANTES de escribir (evita duplicado del auto-sync)
      gastosCompSyncedRef.current = [...gastosCompSyncedRef.current, entryId];
      setGastosCompSynced(s=>[...s, entryId]);

      // Guardar en el balance del grupo (incluye via+tarjeta para referencia)
      const nuevo = {
        id: entryId,
        fecha: fg.fecha, catId: fg.catId, observacion: fg.observacion,
        monto: montoN, pagadoPor: fg.pagadoPor,
        montoOtro, montoMio,
        splitType: fg.splitType, splitValue: fg.splitValue,
        via: isPayer ? fg.via : null, tarjeta: isPayer ? (fg.tarjeta||null) : null,
      };
      if (editItem) {
        const newG = (groupData.gastosComp||[]).map(g=>g.id===editItem.id?nuevo:g);
        fbDb.collection("groups").doc(groupId).update({gastosComp:newG});
      } else {
        fbDb.collection("groups").doc(groupId).update({
          gastosComp: firebase.firestore.FieldValue.arrayUnion(nuevo)
        });
      }

      // Crear gasto personal inmediatamente (misma lógica que auto-sync)
      const catLabel = getCatComp(fg.catId).label.toLowerCase();
      const baseId   = (fg.catId||"").replace(/^comp_/,"");
      const catMatch = cats.find(c=>c.id===baseId)
        || cats.find(c=>c.label.toLowerCase()===catLabel)
        || cats.find(c=>c.id==="extraordinarios")
        || cats[0];
      const gastoPersonal = {
        id: "gc_"+entryId,
        fecha: fg.fecha, fecha_impacto: fi,
        gasto: catMatch?.id,
        observacion: fg.observacion || getCatComp(fg.catId).label,
        tipo_mov:"Gasto", tipo:catMatch?.tipo||"Discrecional",
        via: viaFinal, tarjeta:(isPayer&&fg.tarjeta)?fg.tarjeta:null,
        monto_dividir:null, monto:myShare,
        moneda:"ARS", monto_original:null, tcambio:null,
      };
      if (editItem) {
        // Actualizar el gasto personal existente (puede ser "gc_"+id o id numérico)
        setGastos(gs=>{
          const gcPrefixId = "gc_"+entryId;
          const found = gs.some(g=>g.id===gcPrefixId||g.id===entryId);
          if (found) return gs.map(g=>(g.id===gcPrefixId||g.id===entryId)?{...gastoPersonal,id:g.id}:g);
          return [gastoPersonal,...gs]; // fallback si no existe todavía
        });
      } else {
        setGastos(gs=>[gastoPersonal,...gs]);
      }
      onClose();
    };

    return (
      <Modal title={editItem?"Editar gasto compartido":"Nuevo gasto compartido"} onClose={onClose}>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Fecha</label>
          <input type="date" value={fg.fecha} onChange={e=>setFg({...fg,fecha:e.target.value})} style={inp}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Categoría</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {catsComp.map(c=>{
              const active=fg.catId===c.id;
              return (
                <button key={c.id} onClick={()=>setFg({...fg,catId:c.id})} style={{
                  padding:"9px 11px",borderRadius:9,cursor:"pointer",textAlign:"left",
                  border:`1.5px solid ${active?C.comp:C.rule}`,
                  background:active?C.comp:C.paper,
                  display:"flex",alignItems:"center",gap:9,
                }}>
                  <div style={{width:28,height:28,borderRadius:7,flexShrink:0,
                    background:active?"rgba(255,255,255,0.15)":C.tagComp,
                    display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Icon name={c.icon||"star"} size={13} color={active?"#fff":C.comp}/>
                  </div>
                  <span style={{fontFamily:sans,fontWeight:600,fontSize:12,color:active?"#fff":C.ink}}>{c.label}</span>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Descripción</label>
          <input type="text" placeholder="¿Qué fue?" value={fg.observacion}
            onChange={e=>setFg({...fg,observacion:e.target.value})} style={inp}/>
        </div>
        <div style={{...card,marginBottom:14}}>
          <label style={lbl}>Monto total</label>
          <input type="text" inputMode="decimal" placeholder="$ 0"
            value={fmtARS(fg.monto)}
            onChange={e=>setFg({...fg,monto:parseARS(e.target.value)})}
            style={{...inp,fontFamily:serif,fontSize:28,fontWeight:900,padding:"8px 13px"}}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lbl}>¿Quién pagó?</label>
          <div style={{display:"flex",gap:6}}>
            {(groupData?.members||[]).map(m=>{
              const active=fg.pagadoPor===m.uid;
              const isMe=m.uid===myUid;
              return (
                <button key={m.uid} onClick={()=>setFg({...fg,pagadoPor:m.uid,via:"Efectivo",tarjeta:""})} style={{
                  flex:1,padding:"10px",borderRadius:9,
                  border:`1.5px solid ${active?C.comp:C.rule}`,
                  background:active?C.comp:C.paper,color:active?"#fff":C.ink,
                  fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer",
                }}>
                  {isMe?"Yo":otherName}
                </button>
              );
            })}
          </div>
        </div>
        {/* Vía de pago — solo si pagué yo */}
        {isPayer ? (
          <div style={{marginBottom:14}}>
            <label style={lbl}>Vía de pago</label>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {VIAS_OTRAS.map(({id,label,icon})=>{
                const active=fg.via===id&&!fg.tarjeta;
                return (
                  <button key={id} onClick={()=>setFg({...fg,via:id,tarjeta:""})} style={{
                    flex:1,padding:"9px 6px",borderRadius:8,
                    border:`1.5px solid ${active?C.dark:C.rule}`,
                    background:active?C.dark:C.paper,color:active?"#fff":C.mid,
                    fontFamily:sans,fontWeight:700,fontSize:11,cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center",gap:5,
                  }}>
                    <Icon name={icon} size={12} color={active?"#fff":C.mid}/>{label}
                  </button>
                );
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {tarjetas.map(t=>{
                const active=fg.tarjeta===t.id;
                return (
                  <button key={t.id} onClick={()=>setFg({...fg,via:"Crédito",tarjeta:t.id})} style={{
                    padding:"9px 11px",borderRadius:9,cursor:"pointer",
                    border:`1.5px solid ${active?C.dark:C.rule}`,background:active?C.dark:C.paper,
                    display:"flex",alignItems:"center",gap:8,
                  }}>
                    <Icon name="card" size={14} color={active?"#fff":"#3E6BA8"}/>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontFamily:sans,fontWeight:700,fontSize:11,color:active?"#fff":C.ink}}>{t.label}</div>
                      <div style={{fontFamily:sans,fontSize:9,color:active?"rgba(255,255,255,0.5)":C.mid}}>{t.sub}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{marginBottom:14,padding:"9px 13px",borderRadius:9,background:C.tagComp,display:"flex",alignItems:"center",gap:8}}>
            <Icon name="users" size={13} color={C.comp}/>
            <span style={{fontFamily:sans,fontSize:12,fontWeight:600,color:C.comp}}>Vía de pago: Balance compartido</span>
          </div>
        )}
        <div style={{...card,marginBottom:14}}>
          <label style={lbl}>División</label>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {[["percent","Por %"],["monto","Por monto"]].map(([id,label])=>{
              const active=fg.splitType===id;
              return (
                <button key={id} onClick={()=>setFg({...fg,splitType:id,splitValue:id==="percent"?50:""})} style={{
                  flex:1,padding:"8px",borderRadius:8,
                  border:`1.5px solid ${active?C.dark:C.rule}`,
                  background:active?C.dark:C.paper,color:active?"#fff":C.mid,
                  fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer",
                }}>{label}</button>
              );
            })}
          </div>
          {fg.splitType==="percent" ? (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontFamily:sans,fontSize:12,color:C.mid}}>
                  {fg.pagadoPor===authUser?.uid?"Yo":otherName}: {fg.splitValue}%
                </span>
                <span style={{fontFamily:sans,fontSize:12,color:C.mid}}>
                  {fg.pagadoPor===authUser?.uid?otherName:"Yo"}: {100-fg.splitValue}%
                </span>
              </div>
              <input type="range" min="0" max="100" value={fg.splitValue}
                onChange={e=>setFg({...fg,splitValue:parseInt(e.target.value)})}
                style={{width:"100%",accentColor:C.comp}}/>
            </div>
          ) : (
            <div>
              <label style={{...lbl,marginBottom:5}}>
                Parte de {fg.pagadoPor===authUser?.uid?otherName:"yo"}
              </label>
              <input type="number" placeholder="0" value={fg.splitValue}
                onChange={e=>setFg({...fg,splitValue:e.target.value})} style={inp}/>
            </div>
          )}
          {montoN>0 && (
            <div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {(groupData?.members||[]).map(m=>{
                const isMe=m.uid===authUser?.uid;
                const isPayer=m.uid===fg.pagadoPor;
                const amount=isPayer?montoMio:montoOtro;
                return (
                  <div key={m.uid} style={{background:C.bg,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontFamily:sans,fontSize:10,color:C.mid,marginBottom:3}}>{isMe?"Yo":otherName}</div>
                    <div style={{fontFamily:serif,fontSize:16,fontWeight:900,color:C.comp}}>{fmtP(amount)}</div>
                    {isPayer&&<div style={{fontFamily:sans,fontSize:9,color:C.green}}>Pagó</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <button onClick={guardarComp} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:C.comp,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:14,cursor:"pointer"}}>
          {editItem?"Guardar cambios":"Agregar gasto compartido"}
        </button>
      </Modal>
    );
  };

  /* ── MODAL: PAGO / TRANSFERENCIA ── */
  const ModalPagoComp = ({onClose}) => {
    const [fp, setFp] = useState({
      fecha: today(), de: authUser?.uid||"", monto: "", nota: "",
    });
    const guardarPago = () => {
      if (!parseFloat(fp.monto)||!groupId) return;
      const otherUid = groupData?.members?.find(m=>m.uid!==authUser?.uid)?.uid;
      const a = fp.de===authUser?.uid ? otherUid : authUser?.uid;
      const nuevo = {
        id: Date.now(), fecha: fp.fecha,
        de: fp.de, a, monto: parseFloat(fp.monto), nota: fp.nota,
      };
      fbDb.collection("groups").doc(groupId).update({
        pagos: firebase.firestore.FieldValue.arrayUnion(nuevo)
      });
      onClose();
    };
    const otherName = groupData?.members?.find(m=>m.uid!==authUser?.uid)?.displayName||"Otra persona";
    return (
      <Modal title="Registrar pago" onClose={onClose}>
        <div style={{background:C.tagComp,border:`1px solid #C4B5FD`,borderRadius:8,padding:"10px 12px",marginBottom:14}}>
          <p style={{fontFamily:sans,fontSize:12,color:C.comp,fontWeight:600}}>
            Registrá una transferencia para saldar parte del balance.
          </p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lbl}>¿Quién transfirió?</label>
          <div style={{display:"flex",gap:6}}>
            {(groupData?.members||[]).map(m=>{
              const active=fp.de===m.uid;
              const isMe=m.uid===authUser?.uid;
              return (
                <button key={m.uid} onClick={()=>setFp({...fp,de:m.uid})} style={{
                  flex:1,padding:"10px",borderRadius:9,
                  border:`1.5px solid ${active?C.comp:C.rule}`,
                  background:active?C.comp:C.paper,color:active?"#fff":C.ink,
                  fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer",
                }}>
                  {isMe?"Yo":otherName}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Fecha</label>
          <input type="date" value={fp.fecha} onChange={e=>setFp({...fp,fecha:e.target.value})} style={inp}/>
        </div>
        <div style={{...card,marginBottom:14}}>
          <label style={lbl}>Monto</label>
          <input type="text" inputMode="decimal" placeholder="$ 0"
            value={fmtARS(fp.monto)}
            onChange={e=>setFp({...fp,monto:parseARS(e.target.value)})}
            style={{...inp,fontFamily:serif,fontSize:28,fontWeight:900,padding:"8px 13px"}}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={lbl}>Nota (opcional)</label>
          <input type="text" placeholder="Transferencia, efectivo..." value={fp.nota}
            onChange={e=>setFp({...fp,nota:e.target.value})} style={inp}/>
        </div>
        <button onClick={guardarPago} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:C.comp,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:14,cursor:"pointer"}}>
          Registrar pago
        </button>
      </Modal>
    );
  };

  /* ── MODAL: CATEGORÍAS COMPARTIDAS ── */
  const ModalCatsComp = ({onClose}) => {

                          );

                {(() => {

              {/* Evolución de gastos recurrentes — Compartido */}
              {(()=>{
                const gcList=groupData?.gastosComp||[];
                if(!gcList.length)return null;
                const catsCompList=groupData?.catsComp?.length?groupData.catsComp:CATS_COMP_DEFAULT;

                const MESES_RE=/\b(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/gi;
                const norm=s=>(s||"").replace(MESES_RE,"").replace(/\s+/g," ").trim().toLowerCase();
                const grupos={};
                gcList.forEach(g=>{
                  const nombre=g.observacion||getCatLabel(g.catId);
                  const key=norm(nombre);
                  if(!key)return;
                  if(!grupos[key]){grupos[key]={nombre,meses:{}};}
                  const ym=(g.fecha||"").slice(0,7);
                  grupos[key].meses[ym]=(grupos[key].meses[ym]||0)+g.monto;
                });
                const todos=Object.values(grupos).filter(g=>Object.keys(g.meses).length>=2)

                if(!todos.length)return null;
                const pinned=recurPinnedCRaw;
                const visibles=pinned===null?todos:todos.filter(g=>(pinned||[]).includes(norm(g.nombre)));
                const togglePin=nombre=>{
                  const key=norm(nombre);
                  const cur=pinned===null?todos.map(g=>norm(g.nombre)):(pinned||[]);
                  setRecurPinnedC(cur.includes(key)?cur.filter(k=>k!==key):[...cur,key]);

                    {recurEditC&&(

                            const last=vals[vals.length-1];
                            const prev=vals.length>=2?vals[vals.length-2]:null;

                              <div key={i}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

                        <span style={{fontFamily:sans, fontSize:9, fontWeight:700, letterSpacing:"0.1em", color:C.faint, textTransform:"uppercase", textAlign:"right"}}>RAF</span>
                      </div>

                      {catsRep.length===0 ? (
                        <div style={{textAlign:"center", color:C.mid, padding:"24px", fontFamily:sans, fontSize:13}}>

                  </div>
                  <div style={{fontFamily:serif,fontSize:24,fontWeight:900,color:C.ink,marginBottom:8}}>Balance compartido</div>
                  <div style={{fontFamily:sans,fontSize:13,color:C.mid,lineHeight:1.6}}>
                    Llevá los gastos con otra persona y sabé en cualquier momento quién le debe cuánto al otro.
                  </div>
                </div>
                {!isGuest ? (
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <button onClick={async()=>{
                      setCreating(true);
                      const r = await fsCreateGroup(authUser.uid, authUser.displayName||authUser.email, authUser.email);
                      if (r) {
                        setGroupId(r.groupId); setGroupData(r);
                        fsSave(authUser.uid, {gastos,cats,catsIngreso,catsAhorro,tarjetas,presup,presupComp,objAhorro,groupId:r.groupId});
                      }
                      setCreating(false);
                    }} disabled={creating} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:C.comp,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:creating?.6:1}}>
                      <Icon name="users" size={15} color="#fff"/>
                      {creating?"Creando grupo…":"Crear grupo"}
                    </button>
                    {/* Unirse con link — para cuando alguien perdió la conexión con el grupo */}
                    <div style={{...card,marginTop:4}}>
                      <div style={{fontFamily:sans,fontSize:12,fontWeight:700,color:C.ink,marginBottom:8}}>¿Tenés un link de invitación?</div>
                      <div style={{display:"flex",gap:8}}>
                        <input
                          placeholder="Pegá el link aquí"
                          value={invInput} onChange={e=>setInvInput(e.target.value)}
                          style={{...inp, flex:1, fontSize:12, padding:"9px 10px"}}
                        />
                        <button onClick={async()=>{
                          const raw = invInput.trim();
                          // Aceptar URL completa o solo el token
                          const token = raw.includes("invite=")
                            ? new URLSearchParams(raw.split("?")[1]||raw).get("invite")||raw
                            : raw;
                          if (!token) return;
                          setJoining(true); setJoinErr("");
                          const r = await fsJoinGroup(token, authUser.uid, authUser.displayName||authUser.email, authUser.email);
                          if (r && r!=="notfound" && r!=="full") {
                            setGroupId(r.groupId); setGroupData(r);
                            fsSave(authUser.uid, {gastos,cats,catsIngreso,catsAhorro,tarjetas,presup,presupComp,objAhorro,groupId:r.groupId});
                          } else {
                            setJoinErr(r==="full"?"El grupo ya está completo.":"Link no válido.");
                          }
                          setJoining(false);
                        }} disabled={joining||!invInput.trim()} style={{padding:"9px 14px",borderRadius:8,border:"none",background:C.dark,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer",opacity:(joining||!invInput.trim())?.5:1}}>
                          {joining?"…":"Unirme"}
                        </button>
                      </div>
                      {joinErr && <div style={{fontFamily:sans,fontSize:11,color:C.red,marginTop:6}}>{joinErr}</div>}
                    </div>
                  </div>
                ) : (
                  <div style={{...card,textAlign:"center",color:C.mid,padding:24}}>
                    <p style={{fontFamily:sans,fontSize:13}}>Iniciá sesión para usar el balance compartido.</p>
                  </div>
                )}
              </div>
            );
          }

          const leaveGroup = async () => {
            if (!window.confirm("¿Salir del grupo compartido? Tus datos personales no se borran.")) return;
            try {
              if (fbDb && groupId) {
                const newMembers = (groupData?.members||[]).filter(m=>m.uid!==authUser?.uid);
                const newUids    = (groupData?.memberUids||[]).filter(id=>id!==authUser?.uid);
                await fbDb.collection("groups").doc(groupId).update({members:newMembers, memberUids:newUids});
                // Borrar groupId explícitamente del doc del usuario (fsSave omite null)
                await fbDb.collection("users").doc(authUser.uid).update({
                  groupId: firebase.firestore.FieldValue.delete()
                });
              }
            } catch(e) { console.warn("leaveGroup error:", e); }
            setGroupId(null); setGroupData(null); setGroupReady(false);
          };

          const gastosComp = groupData?.gastosComp||[];
          const pagos       = groupData?.pagos||[];
          const members     = groupData?.members||[];
          const myUid       = authUser?.uid;
          const partner     = members.find(m=>m.uid!==myUid);
          const catsComp    = groupData?.catsComp?.length?groupData.catsComp:CATS_COMP_DEFAULT;
          const balance     = calcBalance(gastosComp, pagos, myUid);
          const inviteUrl   = `https://paularuiz21.github.io/control-gastos/?invite=${groupData?.inviteToken||""}`;
          const getCatComp  = (id) => catsComp.find(c=>c.id===id)||{label:id||"Gasto",icon:"star"};
          const hoyStr      = new Date().toISOString().split("T")[0];
          const esActivo    = item => item.tipo==="pago" || fiComp(item) <= hoyStr;
          const historia    = [
            ...gastosComp.map(g=>({...g,tipo:"gasto"})),
            ...pagos.map(p=>({...p,tipo:"pago"})),
          ].sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
          const historiaActiva    = historia.filter(esActivo);
          const historiaPendiente = historia.filter(i=>!esActivo(i));

          return (
            <div>
              <div style={{...card,marginBottom:14,borderLeft:`3px solid ${C.comp}`,background:C.tagComp}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.comp}}>Balance actual</div>
                  {partner && (
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:C.comp,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span style={{fontFamily:sans,fontSize:10,fontWeight:700,color:"#fff"}}>
                          {(partner.displayName||"?")[0].toUpperCase()}
                        </span>
                      </div>
                      <span style={{fontFamily:sans,fontSize:11,fontWeight:600,color:C.comp}}>{partner.displayName||partner.email||"Otra persona"}</span>
                    </div>

                  <div style={{fontFamily:serif,fontSize:22,fontWeight:900,color:C.green}}>¡Están al día!</div>

                    <div style={{fontFamily:serif,fontSize:26,fontWeight:900,color:C.green}}>{fmtP(balance)}</div>
                    <div style={{fontFamily:sans,fontSize:13,color:C.green,marginTop:4}}>{partner?.displayName||"Otra persona"} te debe {fmtP(balance)}</div>
                  </div>
                ) : (
                  <div>
                    <div style={{fontFamily:serif,fontSize:26,fontWeight:900,color:C.red}}>{fmtP(Math.abs(balance))}</div>
                    <div style={{fontFamily:sans,fontSize:13,color:C.red,marginTop:4}}>Le debés {fmtP(Math.abs(balance))} a {partner?.displayName||"otra persona"}</div>
                  </div>

                <div style={{display:"flex",gap:6,marginTop:12}}>
                  {members.map(m=>{
                    const isMe=m.uid===myUid;
                    const paid=gastosComp.filter(g=>g.pagadoPor===m.uid).reduce((s,g)=>s+g.monto,0);
                    return (
                      <div key={m.uid} style={{flex:1,background:C.bg,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                        <div style={{fontFamily:sans,fontSize:10,color:C.mid,marginBottom:2}}>{isMe?"Yo":(m.displayName||"Otra persona")}</div>
                        <div style={{fontFamily:serif,fontSize:14,fontWeight:900,color:C.ink}}>{fmtP(paid)}</div>
                        <div style={{fontFamily:sans,fontSize:9,color:C.mid}}>pagado</div>
                      </div>
                    );
                  })}

              </div>

                <Icon name="transfer" size={14} color="#fff"/>Registrar transferencia
              </button>

              {members.length<2 && (
                <div style={{...card,marginBottom:14,borderLeft:`3px solid ${C.amber}`}}>
                  <div style={{fontFamily:sans,fontSize:12,fontWeight:700,color:C.amber,marginBottom:6}}>Invitá a otra persona</div>
                  <div style={{fontFamily:sans,fontSize:12,color:C.mid,marginBottom:8}}>Mandá este link por WhatsApp:</div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{flex:1,background:C.bg,borderRadius:7,padding:"8px 10px",fontFamily:sansR,fontSize:11,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inviteUrl}</div>

                      navigator.clipboard.writeText(inviteUrl).catch(()=>{});
                      setCopied(true); setTimeout(()=>setCopied(false),2000);
                    }} style={{padding:"8px 14px",borderRadius:8,border:"none",background:copied?C.green:C.dark,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",transition:"background .3s"}}>
                      {copied?"✓ Copiado":"Copiar"}
                    </button>
                  </div>
                </div>
              )}
              {/* Link de re-invitación siempre disponible (por si alguien pierde el acceso) */}
              <button onClick={()=>{
                navigator.clipboard.writeText(inviteUrl).catch(()=>{});
                setCopied(true); setTimeout(()=>setCopied(false),2000);
              }} style={{width:"100%",marginBottom:14,padding:"9px",borderRadius:8,border:`1px solid ${C.rule}`,background:"transparent",color:copied?C.green:C.mid,fontFamily:sans,fontWeight:600,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"color .3s"}}>
                <Icon name="share" size={11} color={copied?C.green:C.mid}/>
                {copied?"✓ Link copiado":"Copiar link de invitación"}
              </button>

              <div style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid,marginBottom:10}}>Historial</div>

                <div style={{textAlign:"center",color:C.mid,padding:"32px 0",fontFamily:sans,fontSize:13}}>Sin movimientos aún</div>
