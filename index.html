                const renderGasto = (item, pending) => {
                    const cat=getCatComp(item.catId);
                    const isPayer=item.pagadoPor===myUid;
                    const payerName=isPayer?"Yo":(partner?.displayName||"Otra persona");
                    const fi_item    = fiComp(item);
                    const mesImpacto = pending && fi_item !== item.fecha
                      ? MESES[parseInt(fi_item.substring(5,7),10)-1]
                      : null;
                    return (
                        <div key={item.id} style={{...card,display:"flex",alignItems:"center",gap:12,opacity:pending?.5:1}}>
                          <div style={{width:38,height:38,borderRadius:9,flexShrink:0,background:C.tagComp,display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <Icon name={cat.icon||"star"} size={16} color={C.comp}/>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                              <span style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink}}>{cat.label}</span>
                              {item.observacion&&<span style={{fontFamily:sans,fontSize:11,color:C.mid}}>{item.observacion}</span>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,flexWrap:"wrap"}}>
                              <span style={{fontFamily:sans,fontSize:11,color:C.mid}}>{item.fecha}</span>
                              <span style={{color:C.rule}}>·</span>
                              <span style={{fontFamily:sans,fontSize:11,color:C.mid}}>Pagó {payerName}</span>
                              {mesImpacto ? (
                                <span style={{fontFamily:sans,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,background:"#F3F4F6",color:C.mid}}>
                                  Activa en {mesImpacto}
                                </span>
                              ) : (
                                <span style={{fontFamily:sans,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,background:isPayer?"#F0FBF5":"#FFF5F5",color:isPayer?C.green:C.red}}>
                                  {isPayer?`te deben ${fmtP(item.montoOtro)}`:`debés ${fmtP(item.montoOtro)}`}
                                </span>
                              )}
                            </div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontFamily:serif,fontSize:16,fontWeight:900,color:C.comp}}>{fmtP(item.monto)}</div>
                            <div style={{fontFamily:sans,fontSize:10,color:C.mid}}>total</div>
                          </div>
                        </div>
                      );
                  };
                  const renderPago = (item) => {
                      const isFromMe=item.de===myUid;
                      const fromName=isFromMe?"Yo":(partner?.displayName||"Otra persona");
                      const toName=!isFromMe?"Yo":(partner?.displayName||"Otra persona");
                      return (
                        <div key={item.id} style={{...card,display:"flex",alignItems:"center",gap:12,background:"#F0FBF5"}}>
                          <div style={{width:38,height:38,borderRadius:9,flexShrink:0,background:"#D1FAE5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <Icon name="transfer" size={16} color={C.green}/>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink}}>Transferencia</div>
                            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,flexWrap:"wrap"}}>
                              <span style={{fontFamily:sans,fontSize:11,color:C.mid}}>{item.fecha}</span>
                              <span style={{color:C.rule}}>·</span>
                              <span style={{fontFamily:sans,fontSize:11,color:C.green}}>{fromName} → {toName}</span>
                              {item.nota&&<span style={{fontFamily:sans,fontSize:11,color:C.mid}}>· {item.nota}</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                            <div style={{fontFamily:serif,fontSize:16,fontWeight:900,color:C.green}}>{fmtP(item.monto)}</div>
                            <button onClick={()=>{
                              const newP=pagos.filter(p=>p.id!==item.id);
                              fbDb.collection("groups").doc(groupId).update({pagos:newP});
                            }} style={{background:"none",border:"none",cursor:"pointer",padding:2}}>
                              <Icon name="trash" size={13} color={C.mid}/>
                            </button>
                          </div>
                        </div>
                      );
                  };
                  const gruposMes = {};
                  historiaActiva.forEach(item => {
                    const ym = (item.fecha||"").slice(0,7);
                    if (!gruposMes[ym]) gruposMes[ym] = [];
                    gruposMes[ym].push(item);
                  });
                  const mesesOrden = Object.keys(gruposMes).sort((a,b)=>b.localeCompare(a));
                  return (
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {mesesOrden.map(ym => {
                    const [yy,mm] = ym.split("-");
                    const label = `${MESES[parseInt(mm,10)-1]} ${yy}`;
                    const open = balMesesAb.has(ym);
                    return (
                      <div key={ym} style={{marginBottom:2}}>
                        <button onClick={()=>setBalMesesAb(prev=>{const n=new Set(prev);n.has(ym)?n.delete(ym):n.add(ym);return n;})}
                          style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",
                            padding:"9px 13px",background:C.bg,border:"none",
                            borderRadius:open?"8px 8px 0 0":8,cursor:"pointer",
                            borderBottom:open?`1px solid ${C.rule}`:"none"}}>
                          <span style={{fontFamily:sans,fontSize:11,fontWeight:700,color:C.ink,letterSpacing:"0.07em",textTransform:"uppercase"}}>{label}</span>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontFamily:sans,fontSize:10,color:C.mid}}>{gruposMes[ym].length} mov.</span>
                            <span style={{fontFamily:sans,fontSize:10,color:C.mid}}>{open?"▲":"▼"}</span>
                          </div>
                        </button>
                        {open && (
                          <div style={{display:"flex",flexDirection:"column",gap:4,background:C.bg,borderRadius:"0 0 8px 8px",padding:"4px 0"}}>
                            {gruposMes[ym].map(item => item.tipo==="gasto" ? renderGasto(item,false) : renderPago(item))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {historiaPendiente.length>0 && <>
                    <div style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid,marginTop:6,marginBottom:2}}>
                      Pendiente — activa cuando llegue el mes de impacto
                    </div>
                    {historiaPendiente.map(item => renderGasto(item,true))}
                  </>}
                </div>
                  );
                })()}

              <button onClick={()=>setModalComp("cats")} style={{marginTop:14,width:"100%",padding:"10px",borderRadius:9,border:`1.5px solid ${C.rule}`,background:C.paper,color:C.ink,fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <Icon name="list" size={13} color={C.mid}/>Categorías compartidas
              </button>
              <button onClick={leaveGroup} style={{marginTop:8,width:"100%",padding:"10px",borderRadius:9,border:`1.5px solid ${C.rule}`,background:"none",color:C.mid,fontFamily:sans,fontWeight:600,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <Icon name="x" size={12} color={C.mid}/>Salir del grupo
              </button>
              {modalComp==="pago"  && <ModalPagoComp  onClose={()=>setModalComp(null)}/>}
              {modalComp==="cats"  && <ModalCatsComp  onClose={()=>setModalComp(null)}/>}
            </div>
          );
        })()}
      </div>

      {/* ── MODAL REPORTE ── */}
      {reporteImg && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"20px 16px",overflowY:"auto"}} onClick={()=>setReporteImg(null)}>
          <div style={{width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontFamily:sans,fontWeight:700,fontSize:13,color:"#F4F0EB",letterSpacing:"0.08em",textTransform:"uppercase"}}>Reporte generado</span>
              <button onClick={()=>setReporteImg(null)} style={{background:"none",border:"none",cursor:"pointer"}}>
                <Icon name="x" size={18} color="#A09890"/>
              </button>
            </div>
            <img src={reporteImg} style={{width:"100%",borderRadius:10}} alt="Reporte"/>
            <div style={{marginTop:12,padding:"12px 16px",background:"#2A2724",borderRadius:10,textAlign:"center"}}>
              <p style={{fontFamily:sans,fontSize:12,color:"#A09890",marginBottom:4}}>📱 Mantené presionada la imagen para guardarla en tu galería</p>
              <p style={{fontFamily:sans,fontSize:11,color:"#6B6460"}}>Desde ahí podés compartirla por WhatsApp</p>
            </div>
          </div>
        </div>
      )}

      {/* ── SETTINGS MINI MENU ── */}
      {modal==="settings" && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div style={{background:C.bg,borderRadius:"16px 16px 0 0",width:"100%",maxWidth:460,padding:"20px 16px 32px"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:serif,fontSize:20,fontWeight:900,color:C.ink,marginBottom:16}}>Configuración</div>

            {/* ── API key de Anthropic ── */}
            <div style={{background:C.bg,borderRadius:10,border:`1px solid ${C.rule}`,padding:"12px 16px",marginBottom:12}}>
                <div style={{fontFamily:sans,fontWeight:700,fontSize:12,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>
                  Carga desde foto <span style={{color:anthropicKey?C.green:C.amber}}>{anthropicKey?"● Activa":"● Sin configurar"}</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input
                    type="password"
                    placeholder="sk-ant-api03-..."
                    defaultValue={anthropicKey}
                    id="anthropic-key-input"
                    style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1px solid ${C.rule}`,fontFamily:sansR,fontSize:12,color:C.ink,background:C.paper}}
                  />
                  <button onClick={()=>{
                    const val = document.getElementById('anthropic-key-input').value.trim();
                    localStorage.setItem("v1_anthropic_key", val);
                    setAnthropicKey(val);
                    setModal(null);
                  }} style={{padding:"8px 14px",borderRadius:8,border:"none",background:C.dark,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                    Guardar
                  </button>
                </div>
              </div>

            {/* ── Cuenta / sesión ── */}
            <div style={{background:C.bg,borderRadius:10,border:`1px solid ${C.rule}`,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontFamily:sans,fontWeight:700,fontSize:12,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Cuenta</div>
                {isGuest
                  ? <div style={{fontFamily:sansR,fontSize:13,color:C.mid}}>Modo local · sin sincronización</div>
                  : <div style={{fontFamily:sansR,fontSize:13,color:C.ink}}>{authUser?.email || authUser?.displayName || "Sesión activa"}</div>
                }
                {authUser && !isGuest && syncReady && syncError &&
                  <div style={{fontFamily:sansR,fontSize:11,color:C.red,marginTop:2}}>⚠ Error al guardar · {syncError}</div>
                }
                {authUser && !isGuest && syncReady && !syncError && lastSyncedAt &&
                  <div style={{fontFamily:sansR,fontSize:11,color:C.green,marginTop:2}}>✓ Guardado {new Date(lastSyncedAt).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}</div>
                }
                {authUser && !isGuest && syncReady && !syncError && !lastSyncedAt &&
                  <div style={{fontFamily:sansR,fontSize:11,color:C.green,marginTop:2}}>✓ Sincronizado con Firebase</div>
                }
              </div>
              <button onClick={doLogout}
                style={{background:C.tagI,border:`1px solid ${C.rule}`,borderRadius:8,padding:"7px 12px",cursor:"pointer",fontFamily:sans,fontWeight:700,fontSize:12,color:C.accent}}>
                {isGuest ? "Iniciar sesión" : "Cerrar sesión"}
              </button>
            </div>

            {[
              {id:"cats",    icon:"list",     label:"Categorías",              sub:"Agregar, editar o eliminar"},
              {id:"tarjetas",icon:"card",     label:"Tarjetas de crédito",     sub:"Nombre, dígitos y cierre"},
              {id:"presup",      icon:"barchart", label:"Presupuesto mensual",     sub:"Montos por categoría y mes"},
              {id:"presupComp",  icon:"transfer", label:"Presupuesto compartido",   sub:"Total del hogar con tu pareja"},
              {id:"objAhorro",   icon:"star",     label:"Objetivo de ahorro",        sub:"Meta mensual de ahorro/inversión"},
              ...(groupId ? [{id:"catsComp", icon:"users", label:"Categorías compartidas", sub:"Categorías del balance con tu pareja"}] : []),
            ].map(({id,icon,label,sub})=>(
              <button key={id} onClick={()=>setModal(id)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.paper,borderRadius:10,border:`1px solid ${C.rule}`,marginBottom:8,cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                <div style={{width:36,height:36,borderRadius:8,background:C.tagD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Icon name={icon} size={16} color={C.blue}/>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontFamily:sans,fontWeight:700,fontSize:14,color:C.ink}}>{label}</div>
                  <div style={{fontFamily:sans,fontSize:11,color:C.mid,marginTop:1}}>{sub}</div>
                </div>
              </button>
            ))}

            {/* ── BACKUP ── */}
            <div style={{marginTop:8,padding:"12px 14px",background:C.tagD,borderRadius:10,border:`1px solid ${C.rule}`}}>
              <div style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid,marginBottom:10}}>Copia de seguridad</div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                <button onClick={exportarBackupCSV} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:C.paper,borderRadius:8,border:`1px solid ${C.rule}`,cursor:"pointer"}}>
                  <Icon name="download" size={15} color={C.green}/>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink}}>Exportar CSV</div>
                    <div style={{fontFamily:sans,fontSize:11,color:C.mid}}>Todos los movimientos en Excel</div>
                  </div>
                </button>
                <button onClick={exportarBackupJSON} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:C.paper,borderRadius:8,border:`1px solid ${C.rule}`,cursor:"pointer"}}>
                  <Icon name="download" size={15} color={C.blue}/>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink}}>Backup completo (JSON)</div>
                    <div style={{fontFamily:sans,fontSize:11,color:C.mid}}>Gastos + categorías + presupuestos + balance</div>
                  </div>
                </button>
                <label style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:C.paper,borderRadius:8,border:`1px solid ${C.rule}`,cursor:"pointer"}}>
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{ restaurarDesdeBackup(e.target.files[0]); e.target.value=""; }}/>
                  <Icon name="upload" size={15} color={C.red}/>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink}}>Restaurar desde backup (JSON)</div>
                    <div style={{fontFamily:sans,fontSize:11,color:C.mid}}>Agrega los gastos faltantes · no borra ni pisa los actuales</div>
                  </div>
                </label>
              </div>
            </div>

            {/* ── PAPELERA ── */}
            {(() => {
              const cutoff = Date.now() - PAPELERA_TTL;
              const activos = gastosEliminados.filter(e => (e.deletedAt||0) > cutoff);
              return (
                <div style={{marginTop:8,padding:"12px 14px",background:C.tagD,borderRadius:10,border:`1px solid ${C.rule}`}}>
                  <div style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid,marginBottom:10}}>
                    Papelera ({activos.length})
                  </div>
                  {activos.length === 0
                    ? <div style={{fontFamily:sansR,fontSize:12,color:C.faint,textAlign:"center",padding:"8px 0"}}>Sin gastos eliminados en los últimos 30 días</div>
                    : <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {activos
                          .sort((a,b)=>b.deletedAt-a.deletedAt)
                          .map(entry => {
                            const g   = entry.gasto;
                            const cat = cats.find(c=>c.id===g.gasto);
                            const fmt = d => d ? new Date(d+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"}) : "—";
                            const fmtDel = new Date(entry.deletedAt).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
                            const motivo = entry.reason==="sync_auto" ? "Sync automático" : "Eliminado manualmente";
                            return (
                              <div key={`${g.id}_${entry.deletedAt}`} style={{background:C.paper,borderRadius:8,padding:"9px 11px",border:`1px solid ${C.rule}`}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                                      {g.observacion||cat?.label||"Sin descripción"}
                                    </div>
                                    <div style={{fontFamily:sansR,fontSize:11,color:C.mid,marginTop:2}}>
                                      {cat?.label||"—"} · {fmtP(g.fecha)} · ${(g.monto||0).toLocaleString("es-AR")}
                                    </div>
                                    <div style={{fontFamily:sansR,fontSize:10,color:C.faint,marginTop:1}}>
                                      {motivo} · {fmtDel}
                                    </div>
                                  </div>
                                  <button onClick={()=>{
                                    setGastos(gs=>[{...g},  ...gs]);
                                    setGastosEliminados(prev=>prev.filter(e=>!(e.gasto.id===g.id && e.deletedAt===entry.deletedAt)));
                                  }} style={{flexShrink:0,padding:"5px 10px",borderRadius:7,border:"none",background:C.green,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                                    Restaurar
                                  </button>
                                </div>
                              </div>
                            );
                          })
                        }
                      </div>
                  }
                </div>
              );
            })()}

          </div>
        </div>
      )}

      {modal==="cats"       && <ModalCats/>}
      {modal==="presupComp" && <ModalPresupComp/>}
      {modal==="objAhorro"  && <ModalObjAhorro/>}
      {modal==="tarjetas"   && <ModalTarjetas/>}
      {modal==="presup"     && <ModalPresup/>}
      {modal==="catsComp"   && <ModalCatsComp onClose={()=>setModal(null)}/>}

      {/* ── PROMPT: UNIRSE A GRUPO VÍA LINK ── */}
      {showJoinPrompt && pendingInvite && !groupId && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:C.bg,borderRadius:16,padding:24,width:"100%",maxWidth:360}}>
            <div style={{width:48,height:48,borderRadius:12,background:"#E8EEF8",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14}}>
              <Icon name="users" size={22} color={C.blue}/>
            </div>
            <div style={{fontFamily:serif,fontSize:22,fontWeight:900,color:C.ink,marginBottom:8}}>Invitación al grupo</div>
            <div style={{fontFamily:sans,fontSize:13,color:C.mid,marginBottom:20,lineHeight:1.5}}>
              Te invitaron a unirte a un balance compartido. ¿Querés aceptar?
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={async()=>{
                if (!authUser||isGuest) { setShowJoinPrompt(false); return; }
                const r = await fsJoinGroup(pendingInvite, authUser.uid, authUser.displayName||authUser.email, authUser.email);
                if (r && r!=="notfound" && r!=="full") {
                  setGroupId(r.groupId); setGroupData(r);
                  fsSave(authUser.uid, {gastos,cats,catsIngreso,catsAhorro,tarjetas,presup,presupComp,objAhorro,groupId:r.groupId});
                  window.history.replaceState({}, '', window.location.pathname);
                }
                setPendingInvite(null); setShowJoinPrompt(false);
              }} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:C.blue,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                Unirme al grupo
              </button>
              <button onClick={()=>{
                setShowJoinPrompt(false);
                window.history.replaceState({}, '', window.location.pathname);
              }} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${C.rule}`,background:C.paper,color:C.mid,fontFamily:sans,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                Cancelar
              </button>
            </div>
          </div>
        </div>
      )}
      {/* ── TOAST DESHACER ── */}
      {undoData && (
        <div style={{position:"fixed",bottom:76,left:"50%",transform:"translateX(-50%)",zIndex:500,
          background:C.dark,borderRadius:12,padding:"10px 14px",
          display:"flex",alignItems:"center",gap:10,
          boxShadow:"0 4px 20px rgba(0,0,0,0.35)",maxWidth:"calc(100vw - 32px)"}}>
          <span style={{fontFamily:sans,fontSize:13,color:"#E4E0DA",whiteSpace:"nowrap"}}>Gasto eliminado</span>
          <button onClick={deshacerEliminar} style={{
            padding:"5px 12px",borderRadius:7,border:`1.5px solid ${C.amber}`,
            background:"none",cursor:"pointer",
            fontFamily:sans,fontWeight:700,fontSize:12,color:C.amber,whiteSpace:"nowrap",
          }}>Deshacer</button>
          <button onClick={()=>{clearTimeout(undoTimerRef.current);setUndoData(null);}}
            style={{background:"none",border:"none",cursor:"pointer",padding:2,flexShrink:0}}>
            <Icon name="x" size={14} color={C.faint}/>
          </button>
        </div>
      )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
