const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

const fsLoad = async (uid) => {
  if (!fbDb) return null;
  try {
    const snap = await fbDb.collection("users").doc(uid).get();
    return snap.exists ? snap.data() : null;
  } catch(e) { console.warn("fsLoad error:", e); return null; }
};

const fsSave = debounce(async (uid, data) => {
  if (!fbDb) return;
  try { await fbDb.collection("users").doc(uid).set(data); }
  catch(e) { console.warn("fsSave error:", e); }
}, 1500);

/* ── HELPERS ──────────────────────────────────────────────── */
const today = () => new Date().toISOString().split("T")[0];

const getCierre = (t, fecha) => {
  try {
    if (!t || t.cierre === null || t.cierre === undefined) return 19;
    if (typeof t.cierre === "number") return t.cierre;
    if (typeof t.cierre === "object") {
      const mk = (fecha||"").substring(0,7);
      return t.cierre[mk] || t.cierre.default || 19;
    }
    return 19;
  } catch(e) { return 19; }
};

const fechaImpacto = (fecha, tid, tarjetas) => {
  if (!tid) return fecha;
  const t = tarjetas.find(t=>t.id===tid);
  if (!t) return fecha;
  const d = new Date(fecha+"T12:00:00");
  const x = d.getDate()<=t.cierre ? 1 : 2;
  return new Date(d.getFullYear(), d.getMonth()+x, 1).toISOString().split("T")[0];
};

const impactoInfo = (fecha, tid, tarjetas) => {
  if (!tid) return null;
  const t = tarjetas.find(t=>t.id===tid);
  if (!t) return null;
  const d = new Date(fecha+"T12:00:00");
  const cierre = getCierre(t, fecha);
  const x = d.getDate() <= cierre ? 1 : 2;
  return {mes:MESES[(d.getMonth()+x)%12], cerro:x===2, cierre};
};

            {err && <div style={{color:C.red, fontSize:12, textAlign:"center", marginTop:8}}>{err}</div>}
          </>
        )}

        {mode === "email" && (
          <>
            <div style={{fontFamily:sans, fontSize:13, color:C.mid, marginBottom:14}}>
              Si no tenés cuenta, se crea automáticamente al ingresar.
            </div>
            <input value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="Email" type="email" style={inputStyle}/>
            <input value={pass} onChange={e=>setPass(e.target.value)}
              placeholder="Contraseña" type="password" style={inputStyle}
              onKeyDown={e => e.key==="Enter" && loginEmail()}/>
            {err && <div style={{color:C.red, fontSize:12, marginBottom:10}}>{err}</div>}

            <button onClick={loginEmail} disabled={loading}
              style={{...btnBase, background:C.accent, color:"#fff", opacity: loading ? .6 : 1}}>
              {loading ? "Ingresando…" : "Ingresar / Crear cuenta"}
            </button>
            <button onClick={() => { setMode("menu"); setErr(""); }}
              style={{...btnBase, background:"transparent", color:C.mid, border:`1px solid ${C.rule}`}}>
              Volver
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════ */
function App() {
  /* ── AUTH + SYNC STATE ── */
  // Si Firebase no está configurado, ir directo a modo invitado
  const [authUser,   setAuthUser]   = useState(FB_CONFIGURED ? null : false);
  const [isGuest,    setIsGuest]    = useState(!FB_CONFIGURED || localStorage.getItem("v3_guest") === "1");
  const [syncReady,  setSyncReady]  = useState(!FB_CONFIGURED);

  const [gastos, setGastos] = useState(() => load("v6_gastos", []));
  const [cats, setCats] = useState(() => {
    const stored = load("v8_cats", null);
    // Always start from CATS_DEFAULT as base, then apply user customizations on top
    const base = CATS_DEFAULT;
    if (!stored) return base;
    // Keep user label/tipo/icon edits for existing cats, add new defaults, dedupe
    const seen = new Set();
    const merged = [...stored, ...base].filter(c => {
      if (seen.has(c.id)) return false;
      seen.add(c.id);
      return true;
    });
    return merged.sort((a,b)=>a.label.localeCompare(b.label,"es"));
  });
  const [tarjetas, setTarjetas] = useState(() => {
    const stored = load("v5_tarjetas", null);
    const base = stored || TARJETAS_DEFAULT;
    // Migrate: ensure cierre is always an object
    return base.map(t => ({
      ...t,
      cierre: (typeof t.cierre === "object" && t.cierre !== null)
        ? t.cierre
        : {default: typeof t.cierre === "number" ? t.cierre : 19}
    }));
  });
  const [catsIngreso, setCatsIngreso] = useState(() => load("v1_cats_ingreso", CATS_INGRESO));
  const [catsAhorro,  setCatsAhorro]  = useState(() => load("v1_cats_ahorro",  CATS_AHORRO));
  const [presupComp, setPresupComp] = useState(() => load("v5_presup_comp", {}));
  const [presup, setPresup] = useState(() => load("v6_presup", {}));

  const [tab,       setTab]       = useState("cargar");
  const [filtroMes, setFiltroMes] = useState(new Date().getMonth());
  const [filtroCat, setFiltroCat] = useState("Todas");
  const [saved,     setSaved]     = useState(false);
  const [editando,  setEditando]  = useState(null); // gasto id being edited
  const [modal,     setModal]     = useState(null); // "cats" | "tarjetas" | "presup" | "editGasto"
  const [reporteImg, setReporteImg] = useState(null);
  const [vistaResumen, setVistaResumen] = useState("personal"); // "personal" | "compartido"
  const [vistaRep,     setVistaRep]     = useState("personal"); // reporte anual toggle
  const [objAhorro,    setObjAhorro]    = useState(() => load("v5_obj_ahorro", {}));
  const [anthropicKey, setAnthropicKey] = useState(() => localStorage.getItem("v1_anthropic_key") || "");
  const [scanLoading,  setScanLoading]  = useState(false);

  const FORM_INIT = {
    fecha:today(), gasto:cats[0]?.id||"", observacion:"",
    tipo_mov:"Gasto", via:"Débito", tarjeta:"",
    monto_dividir:"", monto:"", dividir:false,
    moneda:"ARS", tcambio:"",
  };
  const [form, setForm] = useState(FORM_INIT);

  useEffect(() => { save("v6_gastos",       gastos);      }, [gastos]);
  useEffect(() => { save("v8_cats",         cats);        }, [cats]);
  useEffect(() => { save("v1_cats_ingreso", catsIngreso); }, [catsIngreso]);
  useEffect(() => { save("v1_cats_ahorro",  catsAhorro);  }, [catsAhorro]);
  useEffect(() => { save("v5_tarjetas",     tarjetas);    }, [tarjetas]);
  useEffect(() => { save("v6_presup",       presup);      }, [presup]);
  useEffect(() => { save("v5_presup_comp",  presupComp);  }, [presupComp]);
  useEffect(() => { save("v5_obj_ahorro",   objAhorro);   }, [objAhorro]);

  /* ── FIREBASE: escuchar cambios de sesión ── */
  useEffect(() => {
    if (!FB_CONFIGURED) return;
    const unsub = fbAuth.onAuthStateChanged(u => setAuthUser(u || false));
    return unsub;
  }, []);

  /* ── FIREBASE: cargar datos de Firestore al iniciar sesión ── */
  useEffect(() => {
    if (!FB_CONFIGURED || isGuest) { setSyncReady(true); return; }
    if (!authUser) return;
    setSyncReady(false);
    fsLoad(authUser.uid).then(data => {
      if (data) {
        if (Array.isArray(data.gastos))                          setGastos(data.gastos);
        if (Array.isArray(data.cats) && data.cats.length > 0)   setCats(data.cats);
        if (Array.isArray(data.catsIngreso))                     setCatsIngreso(data.catsIngreso);
        if (Array.isArray(data.catsAhorro))                      setCatsAhorro(data.catsAhorro);
        if (Array.isArray(data.tarjetas))                        setTarjetas(data.tarjetas);
        if (data.presup     && typeof data.presup     === "object") setPresup(data.presup);
        if (data.presupComp && typeof data.presupComp === "object") setPresupComp(data.presupComp);
        if (data.objAhorro  && typeof data.objAhorro  === "object") setObjAhorro(data.objAhorro);
      }
      setSyncReady(true);
    });
  }, [authUser, isGuest]);

  /* ── FIREBASE: guardar en Firestore cuando cambia cualquier estado ── */
  useEffect(() => {
    if (!authUser || isGuest || !syncReady) return;
    fsSave(authUser.uid, { gastos, cats, catsIngreso, catsAhorro, tarjetas, presup, presupComp, objAhorro });
  }, [gastos, cats, tarjetas, presup, presupComp, objAhorro, syncReady]);

  const set = (k) => (e) => setForm({...form,[k]:e.target.value});

  // Always render cats in alphabetical order regardless of storage order
  const catsSorted = [...cats].sort((a,b) => a.label.localeCompare(b.label, "es"));

  /* ── LEER COMPROBANTE DESDE FOTO ── */
  const analyzeImage = async (file) => {
    if (!anthropicKey) return;
    setScanLoading(true);
    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const allCatNames = [...catsSorted, ...catsIngreso, ...catsAhorro].map(c=>c.label).join(', ');
      const tarjetasNames = tarjetas.map(t=>`${t.label} (${t.sub})`).join(', ');
      const resp = await fetch('https://anthropic-proxy.paula-ruiz21.workers.dev', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': anthropicKey,
          'anthropic-version':'2023-06-01',
        },
        body: JSON.stringify({
          model:'claude-haiku-4-5',
          max_tokens:512,
          messages:[{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:file.type, data:base64}},
            {type:'text', text:`Analizá este comprobante de pago argentino y respondé SOLO con un JSON (sin texto extra):
{
  "fecha": "YYYY-MM-DD",
  "monto": número (solo dígitos y punto decimal, ej: 23060.20),
  "moneda": "ARS" o "USD",
  "tipo_mov": "Gasto" o "Ingreso" o "Ahorro",
  "observacion": "nombre del comercio o descripción breve",
  "via": "Débito" o "Efectivo" o "Transferencia" o nombre de tarjeta si la reconocés,
  "categoria": "la más apropiada de esta lista: ${allCatNames}"
}
Tarjetas disponibles: ${tarjetasNames}
Si no podés determinar un campo usá null.

Reglas específicas de categorización:
- PedidosYa, Rappi o cualquier app de delivery de supermercado → categoría Supermercado
- Smiles, compra de millas, programas de fidelidad de aerolíneas → categoría Viajes
- McDonald's, Burger King, restaurantes, bares, cafeterías → categoría Comidas afuera
- Netflix, Spotify, Disney+, HBO, suscripciones digitales → categoría Suscripciones
- Farmacity, farmacias, médicos, clínicas → categoría Salud
- MercadoPago sin comercio identificado → categoría Transferencia`}
          ]}]
        })
      });
      if (!resp.ok) throw new Error(`Error de API (${resp.status})`);
      const data = await resp.json();
      const text = data.content[0].text.trim();
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No se pudo interpretar el comprobante");
      const r = JSON.parse(jsonMatch[0]);

      const tipoMov = ["Gasto","Ingreso","Ahorro"].includes(r.tipo_mov) ? r.tipo_mov : "Gasto";
      const listaCats = tipoMov==="Ingreso" ? catsIngreso : tipoMov==="Ahorro" ? catsAhorro : catsSorted;
      const cat = listaCats.find(c => r.categoria && c.label.toLowerCase()===r.categoria.toLowerCase());
      const tarj = tarjetas.find(t => r.via && t.label.toLowerCase().includes(r.via.toLowerCase().slice(0,6)));
      const via = tarj ? tarj.label : (r.via || "Débito");
      const tarjeta = tarj ? tarj.id : "";

      setForm(f => ({
        ...f,
        fecha:       r.fecha     || f.fecha,
        monto:       r.monto     != null ? String(r.monto) : f.monto,
        moneda:      r.moneda    || f.moneda,
        tipo_mov:    tipoMov,
        observacion: r.observacion || f.observacion,
        via, tarjeta,
        gasto: cat ? cat.id : f.gasto,
      }));
    } catch(e) {
      alert("No se pudo leer el comprobante: " + e.message);
    } finally {
      setScanLoading(false);
    }
  };

  const montoFinal = (f=form) => {
    if (f.dividir && f.monto_dividir) return parseFloat(f.monto_dividir)/2;
    return parseFloat(f.monto)||0;
  };

  const guardar = () => {
    if (!form.monto && !form.monto_dividir) return;
    const cat = cats.find(c=>c.id===form.gasto);
    const imp = fechaImpacto(form.fecha, form.tarjeta||null, tarjetas);
    const via = form.tarjeta
      ? (tarjetas.find(t=>t.id===form.tarjeta)?.label||"Crédito")
      : form.via;
    const montoBase = montoFinal();
    const montoARS = form.moneda==="USD" && form.tcambio
      ? montoBase * parseFloat(form.tcambio)
      : montoBase;
    const nuevo = {
      id: editando||Date.now(),
      fecha:form.fecha, fecha_impacto:imp,
      gasto:form.gasto, observacion:form.observacion,
      tipo_mov:form.tipo_mov, tipo:cat?.tipo||"",
      via, tarjeta:form.tarjeta||null,
      monto_dividir:form.monto_dividir?parseFloat(form.monto_dividir):null,
      monto:montoARS,
      moneda:form.moneda,
      monto_original:form.moneda==="USD"?montoBase:null,
      tcambio:form.moneda==="USD"&&form.tcambio?parseFloat(form.tcambio):null,
    };
    if (editando) {
      setGastos(gs=>gs.map(g=>g.id===editando?nuevo:g));
      setEditando(null); setModal(null);
    } else {
      setGastos(gs=>[nuevo,...gs]);
    }
    setForm(FORM_INIT);
    setSaved(true); setTimeout(()=>setSaved(false),1600);
  };

  const editarGasto = (g) => {
    setEditando(g.id);
    const tarjetaId = tarjetas.find(t=>t.label===g.via)?.id||"";
    setForm({
      fecha:g.fecha, gasto:g.gasto, observacion:g.observacion||"",
      tipo_mov:g.tipo_mov, via:tarjetaId?g.via:g.via, tarjeta:tarjetaId,
      monto_dividir:g.monto_dividir?String(g.monto_dividir):"",
      monto:tarjetaId?"":(g.monto_dividir?"":String(g.monto)),
      dividir:!!g.monto_dividir,
    });
    setTab("cargar"); setModal(null);
  };

  const eliminarGasto = (id) => setGastos(gs=>gs.filter(g=>g.id!==id));

  /* ── FILTERED DATA ── */
  const filtrados = gastos.filter(g => {
    const ref = g.fecha_impacto||g.fecha;
    const d = new Date(ref+"T12:00:00");
    return d.getMonth()===filtroMes && (filtroCat==="Todas"||g.gasto===filtroCat);
  });

  const mk = mesKey(filtroMes);
  const presupMes = presup[mk]||{};

  const totalG  = filtrados.filter(g=>g.tipo_mov==="Gasto").reduce((s,g)=>s+g.monto,0);
  const totalI  = filtrados.filter(g=>g.tipo_mov==="Ingreso").reduce((s,g)=>s+g.monto,0);
  const totalA     = filtrados.filter(g=>g.tipo_mov==="Ahorro").reduce((s,g)=>s+g.monto,0);
  const objAhorroMes = objAhorro[mk] || 0;
  const totalAAnual    = gastos.filter(g=>g.tipo_mov==="Ahorro").reduce((s,g)=>s+g.monto,0);
  const totalA_USD     = filtrados.filter(g=>g.tipo_mov==="Ahorro"&&g.moneda==="USD").reduce((s,g)=>s+(g.monto_original||0),0);
  const totalAAnual_USD= gastos.filter(g=>g.tipo_mov==="Ahorro"&&g.moneda==="USD").reduce((s,g)=>s+(g.monto_original||0),0);
  const objAhorroAnual = Object.values(objAhorro).reduce((s,v)=>s+v,0);
  const totalI_USD = filtrados.filter(g=>g.tipo_mov==="Ingreso"&&g.moneda==="USD").reduce((s,g)=>s+(g.monto_original||0),0);
  const remanente = totalI - totalG - totalA;
  const indispT = filtrados.filter(g=>g.tipo==="Indispensable"&&g.tipo_mov==="Gasto").reduce((s,g)=>s+g.monto,0);
  const discrT  = filtrados.filter(g=>g.tipo==="Discrecional" &&g.tipo_mov==="Gasto").reduce((s,g)=>s+g.monto,0);
  const totalPresup = Object.values(presupMes).reduce((s,v)=>s+v,0);

  // Gastos compartidos (monto total del hogar = monto_dividir)
  const gastosComp = filtrados.filter(g => g.tipo_mov==="Gasto" && g.monto_dividir);
  const totalComp  = gastosComp.reduce((s,g) => s + g.monto_dividir, 0);
  const presupCompMes = presupComp[mk] || {};
  const totalPresupComp = Object.values(presupCompMes).reduce((s,v)=>s+v,0);

  const porCat = catsSorted.map(c=>({
    ...c,
    total:filtrados.filter(g=>g.gasto===c.id&&g.tipo_mov==="Gasto").reduce((s,g)=>s+g.monto,0),
    count:filtrados.filter(g=>g.gasto===c.id&&g.tipo_mov==="Gasto").length,

  const exportarCSV = () => {
    const h="Fecha,Gasto,Observación,Tipo mov,Tipo,Via,Monto dividir,Monto";
    const r=gastos.map(g=>`${g.fecha},"${cats.find(c=>c.id===g.gasto)?.label||g.gasto}","${g.observacion||""}",${g.tipo_mov},${g.tipo},"${g.via}",${g.monto_dividir||""},${g.monto}`);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([[h,...r].join("\n")],{type:"text/csv;charset=utf-8;"}));
    a.download=`gastos_${MESES[filtroMes]}_2026.csv`; a.click();
  };

  /* ── STYLES ── */

  const lbl = {display:"block",fontFamily:sans,fontWeight:700,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",color:C.mid,marginBottom:7};
  const card = {background:C.paper,borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",padding:"13px 15px"};

  /* ── MONTH STRIP ── */

    <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:6,marginBottom:16}}>
      {MESES.map((m,i)=>(
        <button key={i} onClick={()=>setFiltroMes(i)} style={{
          padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",
          background:filtroMes===i?C.dark:C.paper,
          color:filtroMes===i?"#fff":C.mid,
          fontFamily:sans,fontWeight:700,fontSize:11,
          letterSpacing:"0.06em",whiteSpace:"nowrap",
          boxShadow:filtroMes===i?"none":"0 1px 3px rgba(0,0,0,0.06)",
        }}>{m}</button>
      ))}
    </div>
  );

  /* ── FORM PANEL (shared for add/edit) ── */
  /* ── MODAL: CATEGORÍAS ── */
  const ModalCats = () => {
    const [localGasto,   setLocalGasto]   = useState(cats.map(c=>({...c, tipo: c.tipo||'Discrecional'})));
    const [localIngreso, setLocalIngreso] = useState(catsIngreso.map(c=>({...c})));
    const [localAhorro,  setLocalAhorro]  = useState(catsAhorro.map(c=>({...c})));

    const [nueva, setNueva] = useState({label:"",tipo:"Discrecional",icon:"star"});

    const setLocal = seccion==="Gasto" ? setLocalGasto : seccion==="Ingreso" ? setLocalIngreso : setLocalAhorro;

    const seccionColor = seccion==="Ingreso" ? C.green : seccion==="Ahorro" ? C.blue : C.accent;

    return (
      <Modal title="Categorías" onClose={()=>setModal(null)}>
        {/* Tabs de sección */}
        <div style={{display:"flex",gap:4,marginBottom:16}}>
          {["Gasto","Ingreso","Ahorro"].map(s=>(
            <button key={s} onClick={()=>setSeccion(s)} style={{
              flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",
              background:seccion===s ? (s==="Ingreso"?C.green:s==="Ahorro"?C.blue:C.accent) : C.paper,
              color:seccion===s?"#fff":C.mid,
              fontFamily:sans,fontWeight:700,fontSize:12,
              boxShadow:seccion===s?"none":"0 1px 3px rgba(0,0,0,0.06)",

          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {local.map((c,i)=>(
            <div key={c.id} style={{...card,display:"flex",alignItems:"center",gap:10,padding:"10px 12px"}}>
              <div style={{width:28,height:28,borderRadius:6,
                background:seccion==="Gasto"?(c.tipo==="Indispensable"?C.tagI:C.tagD):"#F0EDE8",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Icon name={c.icon||"star"} size={13}
                  color={seccion==="Gasto"?(c.tipo==="Indispensable"?C.accent:"#4A7CC7"):seccionColor}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <input value={c.label} onChange={e=>setLocal(l=>l.map((x,j)=>j===i?{...x,label:e.target.value}:x))}
                  style={{...inp,padding:"4px 8px",fontSize:13,marginBottom:seccion==="Gasto"?4:0}}/>
                {seccion==="Gasto" && (
                  <div style={{display:"flex",gap:6}}>
                    {["Indispensable","Discrecional"].map(t=>(

        <div style={{...card,marginBottom:14}}>

          <input placeholder="Nombre" value={nueva.label} onChange={e=>setNueva({...nueva,label:e.target.value})}
            style={{...inp,marginBottom:8}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
            {ICON_OPTIONS.map(ic=>(
              <button key={ic} onClick={()=>setNueva({...nueva,icon:ic})} style={{
                width:34,height:34,borderRadius:7,border:`1.5px solid ${nueva.icon===ic?C.dark:C.rule}`,
                background:nueva.icon===ic?C.dark:C.paper,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>
                <Icon name={ic} size={14} color={nueva.icon===ic?"#fff":C.mid}/>
              </button>
            ))}
          </div>
          <button onClick={()=>{
            if(!nueva.label.trim()) return;
            setLocal(l=>[...l,{id:Date.now().toString(),label:nueva.label.trim(),tipo:"Discrecional",icon:nueva.icon}]);
            setNueva({label:"",tipo:"Discrecional",icon:"star"});
          }} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:seccionColor,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:13,cursor:"pointer"}}>
            Agregar categoría de {seccion}
          </button>
        </div>

  /* ── GENERAR REPORTE ── */
  const generarReporte = () => {
    const scale = 2;
    const W = 460 * scale;
    const PAD = 18 * scale;
    const DARK="#1C1A17", BG="#F0EDE8", PAPER="#FFFFFF";
    const ACCENT="#E8450A", RED="#C0392B", GREEN="#1A6B3A";
    const MID="#A09890", RULE="#E4E0DA", BLUE="#1B4F9A";
    const fmtN = (n) => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);

    const mk2 = mesKey(filtroMes);
    const presupMesRep = presup[mk2] || {};

    // Per category: mes y anual
    const gastoMesCat = {}, gastoAnualCat = {}, presupAnualCat = {};
    cats.forEach(c => {
      gastoMesCat[c.id]    = gastos.filter(g => {
        const ref = g.fecha_impacto||g.fecha;
        return g.gasto===c.id && g.tipo_mov==="Gasto" && new Date(ref+"T12:00:00").getMonth()===filtroMes;
      }).reduce((s,g)=>s+g.monto,0);
      gastoAnualCat[c.id]  = gastos.filter(g=>g.gasto===c.id&&g.tipo_mov==="Gasto").reduce((s,g)=>s+g.monto,0);
      presupAnualCat[c.id] = Object.values(presup).reduce((s,m)=>s+(m[c.id]||0),0);
    });

    const totalGMes     = Object.values(gastoMesCat).reduce((s,v)=>s+v,0);
    const totalPresupMes= Object.values(presupMesRep).reduce((s,v)=>s+v,0);
    const totalGAnual   = Object.values(gastoAnualCat).reduce((s,v)=>s+v,0);
    const totalPAnual   = Object.values(presupAnualCat).reduce((s,v)=>s+v,0);
    const rafAnual      = totalPAnual - totalGAnual;

    const catsWithData = cats.filter(c=>presupAnualCat[c.id]>0||gastoAnualCat[c.id]>0||gastoMesCat[c.id]>0);
    const rowH = 62*scale;
    const headerH = 220*scale;
    const secH = 28*scale;
    const footerH = 50*scale;
    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = headerH + secH + catsWithData.length*rowH + secH + footerH + 20*scale;
    const ctx = canvas.getContext("2d");

    // BG
    ctx.fillStyle = BG;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // DARK HEADER
    ctx.fillStyle = DARK;
    ctx.fillRect(0,0,W,headerH);

    // Title
    ctx.fillStyle = "#F4F0EB";
    ctx.font = `900 ${20*scale}px Georgia,serif`;
    ctx.fillText("Control de Gastos", PAD, 38*scale);
    ctx.fillStyle = "#6B6460";
    ctx.font = `${9*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText(`SEGUIMIENTO 2026 · ${MESES[filtroMes].toUpperCase()}`, PAD, 54*scale);

    // ── MES boxes
    ctx.fillStyle = "#A09890";
    ctx.font = `700 ${8*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText(`MES · ${MESES[filtroMes].toUpperCase()}`, PAD, 72*scale);

    const mesBoxes = [
      {label:"GASTADO", value:fmtN(totalGMes), col:RED},
      {label:"PRESUPUESTO", value:fmtN(totalPresupMes), col:BLUE},
      {label:"DESVÍO", value:fmtN(totalGMes-totalPresupMes), col:totalGMes<=totalPresupMes?GREEN:RED},
    ];
    const bw=(W-PAD*2-16*scale)/3;
    mesBoxes.forEach((b,i)=>{
      const bx=PAD+i*(bw+8*scale), by=80*scale;
      ctx.fillStyle=PAPER; ctx.beginPath(); ctx.roundRect(bx,by,bw,56*scale,7*scale); ctx.fill();
      ctx.fillStyle=b.col; ctx.fillRect(bx,by,3*scale,56*scale);
      ctx.fillStyle=MID; ctx.font=`700 ${7.5*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(b.label,bx+9*scale,by+16*scale);
      ctx.fillStyle=b.col; ctx.font=`900 ${12*scale}px Georgia,serif`;
      ctx.fillText(b.value,bx+9*scale,by+38*scale);
    });

    // ── ANUAL boxes
    ctx.fillStyle = "#A09890";
    ctx.font = `700 ${8*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText("ACUMULADO ANUAL", PAD, 152*scale);

    const anualBoxes = [
      {label:"GASTADO AÑO", value:fmtN(totalGAnual), col:RED},
      {label:"PRESUP. AÑO", value:fmtN(totalPAnual), col:BLUE},
      {label:"RAF RESTANTE", value:fmtN(rafAnual), col:rafAnual>=0?GREEN:RED},
    ];
    anualBoxes.forEach((b,i)=>{
      const bx=PAD+i*(bw+8*scale), by=160*scale;
      ctx.fillStyle=PAPER; ctx.beginPath(); ctx.roundRect(bx,by,bw,50*scale,7*scale); ctx.fill();
      ctx.fillStyle=b.col; ctx.fillRect(bx,by,3*scale,50*scale);
      ctx.fillStyle=MID; ctx.font=`700 ${7.5*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(b.label,bx+9*scale,by+14*scale);
      ctx.fillStyle=b.col; ctx.font=`900 ${11*scale}px Georgia,serif`;
      ctx.fillText(b.value,bx+9*scale,by+34*scale);
    });

    // ── SECTION: DESGLOSE POR CATEGORÍA
    let y = headerH;
    ctx.fillStyle="#2A2724"; ctx.fillRect(0,y,W,secH);
    ctx.fillStyle=MID; ctx.font=`700 ${8.5*scale}px 'Barlow Condensed',sans-serif`;
    ctx.fillText("CATEGORÍA", PAD, y+18*scale);
    ctx.textAlign="right";
    ctx.fillText("MES", W-PAD-160*scale, y+18*scale);
    ctx.fillText("ANUAL", W-PAD-76*scale, y+18*scale);
    ctx.fillText("RAF", W-PAD, y+18*scale);
    ctx.textAlign="left";
    y += secH;

    catsWithData.forEach((c,i)=>{
      const gMes  = gastoMesCat[c.id]||0;
      const gAnu  = gastoAnualCat[c.id]||0;
      const pAnu  = presupAnualCat[c.id]||0;
      const pMes  = presupMesRep[c.id]||0;
      const raf2  = pAnu - gAnu;
      const over  = raf2<0;
      const isI   = c.tipo==="Indispensable";
      const ry    = y + i*rowH;

      if(i%2===0){ctx.fillStyle=PAPER;}else{ctx.fillStyle="#F8F5F1";}
      ctx.fillRect(0,ry,W,rowH);

      // accent
      ctx.fillStyle=isI?ACCENT:BLUE;
      ctx.fillRect(0,ry,3*scale,rowH);

      // name
      ctx.fillStyle=DARK; ctx.font=`700 ${11*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(c.label,PAD,ry+16*scale);

      // tipo
      ctx.fillStyle=isI?ACCENT:BLUE; ctx.font=`600 ${7*scale}px 'Barlow Condensed',sans-serif`;
      ctx.fillText(isI?"INDISPENSABLE":"DISCRECIONAL",PAD,ry+28*scale);

      // progress bar anual
      if(pAnu>0){
        const bW2=140*scale, bX2=W-PAD-bW2-168*scale, bY2=ry+34*scale;
        ctx.fillStyle=RULE; ctx.beginPath(); ctx.roundRect(bX2,bY2,bW2,4*scale,2*scale); ctx.fill();
        ctx.fillStyle=over?RED:GREEN; ctx.beginPath();
        ctx.roundRect(bX2,bY2,bW2*Math.min(gAnu/pAnu,1),4*scale,2*scale); ctx.fill();
      }

      // numbers
      ctx.textAlign="right";
      ctx.font=`900 ${10.5*scale}px Georgia,serif`;
      ctx.fillStyle=gMes>0?(pMes>0&&gMes>pMes?RED:DARK):MID;
      ctx.fillText(gMes>0?fmtN(gMes):"—",W-PAD-160*scale,ry+20*scale);
      ctx.fillStyle=gAnu>0?RED:MID;
      ctx.fillText(gAnu>0?fmtN(gAnu):"—",W-PAD-76*scale,ry+20*scale);
      ctx.fillStyle=pAnu>0?(over?RED:GREEN):MID;
      ctx.fillText(pAnu>0?fmtN(raf2):"—",W-PAD,ry+20*scale);
      ctx.textAlign="left";

      // separator
      ctx.fillStyle=RULE; ctx.fillRect(PAD,ry+rowH-1,W-PAD*2,1);
    });

    // FOOTER
    const fy2 = y + catsWithData.length*rowH;
    ctx.fillStyle=DARK; ctx.fillRect(0,fy2,W,footerH+20*scale);
    ctx.fillStyle="#6B6460"; ctx.font=`${8.5*scale}px 'Barlow Condensed',sans-serif`;
    ctx.textAlign="center";
    ctx.fillText(`Control de Gastos · 2026 · ${new Date().toLocaleDateString("es-AR")}`,W/2,fy2+28*scale);
    ctx.textAlign="left";

    setReporteImg(canvas.toDataURL("image/png"));
  };


  /* ── MODAL OVERLAY ── */
  const Modal = ({title, onClose, children}) => (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:C.bg,borderRadius:"16px 16px 0 0",width:"100%",maxWidth:460,maxHeight:"85vh",overflow:"auto",padding:"20px 16px 32px"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontFamily:serif,fontSize:20,fontWeight:900,color:C.ink}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><Icon name="x" size={18} color={C.mid}/></button>
        </div>
        {children}
      </div>
    </div>
  );

  /* ══════════════════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════════════════ */
  /* ── AUTH GATE ── */
  const goGuest  = () => { localStorage.setItem("v3_guest","1"); setIsGuest(true); };
  const doLogout = () => {
    localStorage.removeItem("v3_guest");
    setIsGuest(false); setSyncReady(false);
    fbAuth.signOut();
  };

  if (!isGuest && authUser === null) {
    return (
      <div style={{minHeight:"100vh",background:C.dark,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:sans,color:C.faint,fontSize:13,letterSpacing:"0.1em"}}>Verificando sesión…</div>
      </div>
    );
  }
  if (!isGuest && authUser === false) {
    return <LoginScreen onGuest={goGuest}/>;
  }
  if (authUser && !isGuest && !syncReady) {
    return (
      <div style={{minHeight:"100vh",background:C.dark,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:sans,color:C.faint,fontSize:13,letterSpacing:"0.1em"}}>Sincronizando datos…</div>
      </div>
    );
  }

  return (
    <div style={{fontFamily:sansR,background:C.dark,minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:480,background:C.bg,minHeight:"100vh",position:"relative"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap');`}</style>

      {/* ── DARK HEADER ── */}
      <div style={{background:C.dark,padding:"28px 20px 0"}}>
        <div style={{maxWidth:"100%",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
            <div>
              <div style={{fontFamily:sans,fontSize:10,letterSpacing:"0.22em",textTransform:"uppercase",color:C.faint,marginBottom:5}}>
                Seguimiento · 2026
              </div>
              <div style={{fontFamily:serif,fontSize:36,fontWeight:900,color:"#F4F0EB",letterSpacing:"-0.01em",lineHeight:1}}>
                Control de Gastos
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
              <div style={{background:C.accent,borderRadius:7,padding:"5px 12px"}}>
                <span style={{fontFamily:serif,fontSize:18,fontWeight:900,color:"#fff",letterSpacing:"0.01em"}}>
                  {MESES[new Date().getMonth()]}
                </span>
              </div>
              {/* Settings button */}
              <button onClick={()=>setModal("settings")} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:7,padding:"6px 10px",cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}>
                <Icon name="settings" size={13} color="#fff"/>
                <span style={{fontFamily:sans,fontSize:10,color:"#fff",fontWeight:600,letterSpacing:"0.06em"}}>Config</span>
              </button>
            </div>
          </div>

          {totalG > 0 && (
            <div style={{marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontFamily:sans,fontSize:10,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase"}}>Indispensable</span>
                <span style={{fontFamily:sans,fontSize:10,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase"}}>Discrecional</span>
              </div>
              <div style={{height:4,background:C.dark2,borderRadius:2,overflow:"hidden",display:"flex"}}>
                <div style={{width:`${(indispT/totalG)*100}%`,background:C.accent,transition:"width .5s"}}/>
                <div style={{flex:1,background:"#4A7CC7"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontFamily:sans,fontSize:10,fontWeight:700,color:C.accent}}>{Math.round((indispT/totalG)*100)}%</span>
                <span style={{fontFamily:sans,fontSize:10,fontWeight:700,color:"#4A7CC7"}}>{Math.round((discrT/totalG)*100)}%</span>
              </div>
            </div>
          )}

          {/* Tabs */}
          <div style={{display:"flex"}}>
            {[["cargar","plus","Registrar"],["lista","list","Movimientos"],["resumen","barchart","Resumen"]].map(([id,icon,label])=>{
              const active=tab===id;
              return (
                <button key={id} onClick={()=>setTab(id)} style={{
                  flex:1,padding:"11px 6px",border:"none",
                  background:active?C.bg:"transparent",borderRadius:active?"8px 8px 0 0":0,
                  color:active?C.ink:C.faint,fontFamily:sans,fontWeight:700,fontSize:11,
                  letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .15s",
                }}>
                  <Icon name={icon} size={13} color={active?C.ink:C.faint}/>{label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{maxWidth:"100%",margin:"0 auto",padding:"20px 16px 40px"}}>

        {/* ════ REGISTRAR */}
        {tab==="cargar" && (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {editando && (
        <div style={{background:C.tagI,border:`1px solid #F5C0A0`,borderRadius:8,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
          <Icon name="edit" size={13} color={C.accent}/>
          <span style={{fontFamily:sans,fontSize:12,color:C.accent,fontWeight:700}}>Editando movimiento</span>
          <button onClick={()=>{setEditando(null);setForm(FORM_INIT);}} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:C.accent}}>
            <Icon name="x" size={13} color={C.accent}/>
          </button>
        </div>
      )}

      {/* ── Botón cargar desde foto ── */}
      {anthropicKey && (
        <div>
          <input id="foto-input" type="file" accept="image/*"
            style={{display:"none"}}
            onChange={e => { if(e.target.files[0]) analyzeImage(e.target.files[0]); e.target.value=""; }}/>
          <button onClick={()=>document.getElementById('foto-input').click()}
            disabled={scanLoading}
            style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px dashed ${C.blue}`,
              background:C.tagD,color:C.blue,fontFamily:sans,fontWeight:700,fontSize:13,
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              opacity:scanLoading?.6:1}}>
            {scanLoading
              ? <><Icon name="clock" size={15} color={C.blue}/>Analizando comprobante…</>
              : <><Icon name="download" size={15} color={C.blue}/>Cargar desde foto</>
            }
          </button>
        </div>
      )}

      {/* Fecha + Tipo */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <label style={lbl}>Fecha</label>
          <input type="date" value={form.fecha} onChange={set("fecha")} style={inp}/>
        </div>
        <div>
          <label style={lbl}>Tipo</label>
          <div style={{display:"flex",gap:6}}>
            {[
              {id:"Gasto",   icon:"trending_down", col:C.red},
              {id:"Ingreso", icon:"trending_up",   col:C.green},
              {id:"Ahorro",  icon:"star",           col:"#1B4F9A"},
            ].map(({id,icon,col})=>{
              const active=form.tipo_mov===id;
              return (
                <button key={id} onClick={()=>setForm({...form,tipo_mov:id})} style={{
                  flex:1,padding:"9px 4px",borderRadius:8,border:`1.5px solid ${active?col:C.rule}`,
                  background:active?col:C.paper,color:active?"#fff":C.mid,
                  fontFamily:sans,fontWeight:700,fontSize:11,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:5,
                }}>
                  <Icon name={icon} size={12} color={active?"#fff":C.mid}/>
                  {id}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Categoría */}
      <div>
        <label style={lbl}>Categoría</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {(form.tipo_mov==="Ingreso"?catsIngreso:form.tipo_mov==="Ahorro"?catsAhorro:catsSorted).map((c)=>{
            const {id,label,tipo,icon} = c;
            const active=form.gasto===id;
            const isI=tipo==="Indispensable";
            const iconBg = active?"rgba(255,255,255,0.1)":(form.tipo_mov==="Gasto"?(isI?C.tagI:C.tagD):"#F0EDE8");
            const iconCol = active?"#fff":(form.tipo_mov==="Ingreso"?C.green:form.tipo_mov==="Ahorro"?C.blue:(isI?C.accent:"#4A7CC7"));
            return (
              <button key={id} onClick={()=>setForm({...form,gasto:id})} style={{
                padding:"9px 11px",borderRadius:9,cursor:"pointer",textAlign:"left",
                border:`1.5px solid ${active?C.dark:C.rule}`,
                background:active?C.dark:C.paper,
                display:"flex",alignItems:"center",gap:9,
                boxShadow:active?"none":"0 1px 3px rgba(0,0,0,0.05)",transition:"all .14s",
              }}>
                <div style={{width:30,height:30,borderRadius:7,flexShrink:0,background:iconBg,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Icon name={icon||"star"} size={14} color={iconCol}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:sans,fontWeight:600,fontSize:12,color:active?"#fff":C.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{label}</div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Observación */}
      <div>
        <label style={lbl}>Observación</label>
        <input type="text" placeholder="Carrefour, Netflix, Uber..." value={form.observacion} onChange={set("observacion")} style={inp}/>
      </div>

      {/* Moneda */}
      <div>
        <label style={lbl}>Moneda</label>
        <div style={{display:"flex",gap:6}}>
          {[{id:"ARS",label:"$ ARS"},{id:"USD",label:"U$S USD"}].map(({id,label})=>{
            const active=form.moneda===id;
            return (
              <button key={id} onClick={()=>setForm({...form,moneda:id,tcambio:""})} style={{
                flex:1,padding:"9px 8px",borderRadius:8,border:`1.5px solid ${active?C.dark:C.rule}`,
                background:active?C.dark:C.paper,color:active?"#fff":C.mid,
                fontFamily:sans,fontWeight:700,fontSize:13,cursor:"pointer",
              }}>{label}</button>
            );
          })}
        </div>
        {form.moneda==="USD"&&(
          <div style={{marginTop:8}}>
            <label style={{...lbl,marginBottom:5}}>Tipo de cambio (1 USD = ? ARS)</label>
            <input type="number" placeholder="Ej: 1250" value={form.tcambio} onChange={set("tcambio")}
              style={inp}/>
            {form.tcambio&&form.monto&&(
              <div style={{marginTop:6,fontFamily:sans,fontSize:12,color:C.mid}}>
                Equivale a {fmt(parseFloat(form.monto||0)*parseFloat(form.tcambio||0))} ARS
              </div>
            )}
          </div>
        )}
      </div>

      {/* Monto */}
      <div style={{...card}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <label style={{...lbl,margin:0}}>Monto</label>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:sans,fontSize:11,color:C.mid,fontWeight:600}}>
            <input type="checkbox" checked={form.dividir} onChange={e=>setForm({...form,dividir:e.target.checked,monto:"",monto_dividir:""})} style={{accentColor:C.dark}}/>
            <Icon name="scissors" size={11} color={C.mid}/> Dividir en 2
          </label>
        </div>
        {form.dividir ? (
          <div>
            <input type="number" placeholder="Monto total" value={form.monto_dividir} onChange={set("monto_dividir")} style={inp}/>
            {form.monto_dividir && (
              <div style={{marginTop:9,padding:"9px 13px",background:C.bg,borderRadius:7,fontFamily:serif,fontSize:22,color:C.ink,fontWeight:900}}>
                Tu parte: {fmt(parseFloat(form.monto_dividir)/2)}
              </div>
            )}
          </div>
        ) : (
          <input type="number" placeholder="$ 0" value={form.monto} onChange={set("monto")}
            style={{...inp,fontFamily:serif,fontSize:28,fontWeight:900,padding:"8px 13px"}} placeholder={form.moneda==="USD"?"U$S 0":"$ 0"}
            onKeyDown={e=>e.key==="Enter"&&guardar()}/>
        )}
      </div>

      {/* Vía de pago */}
      <div>
        <label style={lbl}>Vía de pago</label>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {VIAS_OTRAS.map(({id,label,icon})=>{
            const active=form.via===id&&!form.tarjeta;
            return (
              <button key={id} onClick={()=>setForm({...form,via:id,tarjeta:""})} style={{
                flex:1,padding:"9px 6px",borderRadius:8,border:`1.5px solid ${active?C.dark:C.rule}`,
                background:active?C.dark:C.paper,color:active?"#fff":C.mid,
                fontFamily:sans,fontWeight:700,fontSize:11,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",gap:5,
                boxShadow:active?"none":"0 1px 3px rgba(0,0,0,0.05)",
              }}>
                <Icon name={icon} size={12} color={active?"#fff":C.mid}/>{label}
              </button>
            );
          })}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {tarjetas.map(t=>{
            const active=form.tarjeta===t.id;
            return (
              <button key={t.id} onClick={()=>setForm({...form,via:"Crédito",tarjeta:t.id})} style={{
                padding:"9px 11px",borderRadius:9,cursor:"pointer",
                border:`1.5px solid ${active?C.dark:C.rule}`,background:active?C.dark:C.paper,
                display:"flex",alignItems:"center",gap:8,
                boxShadow:active?"none":"0 1px 3px rgba(0,0,0,0.05)",transition:"all .14s",
              }}>
                <Icon name="card" size={14} color={active?"#fff":"#4A7CC7"}/>
                <div style={{textAlign:"left"}}>
                  <div style={{fontFamily:sans,fontWeight:700,fontSize:11,color:active?"#fff":C.ink}}>{t.label}</div>
                  <div style={{fontFamily:sans,fontSize:9,color:active?"rgba(255,255,255,0.5)":C.mid,letterSpacing:"0.06em"}}>{t.sub}</div>
                </div>
              </button>
            );
          })}
        </div>
        {form.tarjeta && (()=>{
          const info=impactoInfo(form.fecha,form.tarjeta,tarjetas);
          if(!info) return null;
          return (
            <div style={{marginTop:10,padding:"9px 13px",borderRadius:8,background:info.cerro?"#FEF0E8":"#EEF4FF",border:`1px solid ${info.cerro?"#F5C0A0":"#BDD0EE"}`,display:"flex",alignItems:"center",gap:8}}>
              <Icon name={info.cerro?"alert":"card"} size={13} color={info.cerro?C.amber:C.blue}/>
              <span style={{fontFamily:sans,fontSize:12,fontWeight:600,color:info.cerro?C.amber:C.blue}}>
                {info.cerro?`Cerró el ${info.cierre} — impacta en ${info.mes}`:`Impacta en ${info.mes}`}
              </span>
            </div>
          );
        })()}
      </div>

      <button onClick={guardar} style={{
        padding:"14px",borderRadius:10,border:"none",
        background:saved?C.green:C.accent,color:"#fff",
        fontFamily:sans,fontWeight:700,fontSize:14,
        letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",gap:8,
        boxShadow:`0 4px 16px ${saved?C.green+"44":C.accent+"44"}`,transition:"background .3s",
      }}>
        <Icon name={saved?"check":"plus"} size={15} color="#fff" sw={2.5}/>
        {saved?(editando?"Cambios guardados":"Guardado"):(editando?"Guardar cambios":"Guardar movimiento")}
      </button>
        </div>
        )}

        {/* ════ MOVIMIENTOS */}
        {tab==="lista" && (
          <div>
            <MesTabs/>
            <select value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}
              style={{...inp,marginBottom:14,cursor:"pointer",fontFamily:sans,fontWeight:600}}>
              <option value="Todas">Todas las categorías</option>
              {catsSorted.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
            </select>

            {filtrados.length>0 && (
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{...card,borderLeft:`3px solid ${C.red}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                      <Icon name="trending_down" size={12} color={C.red}/>
                      <span style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid}}>Gastos</span>
                    </div>
                    <div style={{fontFamily:serif,fontSize:22,fontWeight:900,color:C.red}}>{fmt(totalG)}</div>
                  </div>
                  <div style={{...card,borderLeft:`3px solid ${C.green}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                      <Icon name="trending_up" size={12} color={C.green}/>
                      <span style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid}}>Ingresos</span>
                    </div>
                    <div style={{fontFamily:serif,fontSize:22,fontWeight:900,color:C.green}}>{fmt(totalI)}</div>
                  </div>
                </div>
                {totalA>0 && (
                  <div style={{...card,borderLeft:`3px solid ${C.blue}`}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <Icon name="star" size={12} color={C.blue}/>
                        <span style={{fontFamily:sans,fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mid}}>Ahorro / Inversión</span>
                      </div>
                      <div style={{fontFamily:serif,fontSize:22,fontWeight:900,color:C.blue}}>{fmt(totalA)}</div>
                      {totalA_USD>0 && <div style={{fontFamily:sans,fontSize:12,fontWeight:700,color:C.blue}}>{fmtUSD(totalA_USD)}</div>}
                    </div>
                    {objAhorroMes>0 && (
                      <div style={{marginTop:6}}>
                        <div style={{height:4,background:C.bg,borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${Math.min((totalA/objAhorroMes)*100,100)}%`,height:"100%",background:totalA>=objAhorroMes?C.green:C.blue,transition:"width .5s"}}/>
                        </div>
                        <div style={{fontFamily:sans,fontSize:10,color:C.mid,marginTop:3}}>
                          {((totalA/objAhorroMes)*100).toFixed(0)}% del objetivo mensual · {fmt(objAhorroMes)}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {filtrados.length===0 ? (
              <div style={{textAlign:"center",color:C.mid,padding:"52px 0",fontFamily:serif,fontSize:20,fontWeight:900}}>
                Sin movimientos en {MESES[filtroMes]}
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:500,overflowY:"auto"}}>
                {filtrados.map(g=>{
                  const cat=cats.find(c=>c.id===g.gasto);
                  const isI=g.tipo==="Indispensable";
                  const info=g.tarjeta?impactoInfo(g.fecha,g.tarjeta,tarjetas):null;
                  return (
                    <div key={g.id} style={{...card,display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:38,height:38,borderRadius:9,flexShrink:0,background:isI?C.tagI:C.tagD,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <Icon name={cat?.icon||"star"} size={16} color={isI?C.accent:"#4A7CC7"}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span style={{fontFamily:sans,fontWeight:700,fontSize:13,color:C.ink}}>{cat?.label||g.gasto}</span>
                          {g.observacion&&<span style={{fontFamily:sans,fontSize:12,color:C.mid}}>{g.observacion}</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,flexWrap:"wrap"}}>
                          <span style={{fontFamily:sans,fontSize:11,color:C.mid}}>{g.fecha}</span>
                          <span style={{color:C.rule}}>·</span>
                          <span style={{fontFamily:sans,fontSize:11,color:C.mid}}>{g.via}</span>
                          {info&&(
                            <span style={{fontFamily:sans,fontSize:9,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"2px 6px",borderRadius:4,background:info.cerro?"#FEF0E8":"#EEF4FF",color:info.cerro?C.amber:C.blue}}>
                              {info.cerro?`! ${info.mes}`:info.mes}
                            </span>
                          )}
                          {g.monto_dividir&&<span style={{fontFamily:sans,fontSize:11,color:C.blue}}>Total: {fmt(g.monto_dividir)}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:serif,fontSize:18,fontWeight:900,color:g.tipo_mov==="Ingreso"?C.green:(g.tipo_mov==="Ahorro"?C.blue:C.red)}}>
                            {g.tipo_mov==="Ingreso"?"+":"−"}{fmt(g.monto)}
                          </div>
                          {g.moneda==="USD"&&g.monto_original&&(
                            <div style={{fontFamily:sans,fontSize:10,color:C.mid}}>{fmtUSD(g.monto_original)}</div>
                          )}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:4}}>

                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:serif, fontSize:12, fontWeight:900, color:C.blue}}>{totalAAnual>0?fmt(totalAAnual):"—"}</div>
                              {totalAAnual_USD>0 && <div style={{fontFamily:sans, fontSize:10, color:C.blue, fontWeight:700}}>{fmtUSD(totalAAnual_USD)}</div>}
                            </div>
                            <div style={{fontFamily:serif, fontSize:12, fontWeight:900, color:objAhorroAnual>0?C.ink:C.mid, textAlign:"right"}}>{objAhorroAnual>0?fmt(objAhorroAnual):"—"}</div>
                            <div style={{fontFamily:serif, fontSize:12, fontWeight:900, textAlign:"right",
                              color:objAhorroAnual>0?(totalAAnual>=objAhorroAnual?C.green:C.red):C.mid}}>
                              {objAhorroAnual>0?fmt(totalAAnual-objAhorroAnual):"—"}
                            </div>
                          </div>
                        )}
                        {catsRep.map((c,i)=>{
                          const gastado = isComp ? gastoCompAnualCat[c.id]  : gastoAnualCat[c.id];
                          const pAnual  = isComp ? presupCompAnualCat[c.id] : presupAnualCat[c.id];
                          const raf2    = pAnual - gastado;
                          const over    = raf2 < 0;
                          const isI     = c.tipo==="Indispensable";
                          return (
                            <div key={c.id} style={{
                              display:"grid", gridTemplateColumns:"1fr 80px 80px 80px", gap:4,
                              padding:"10px 12px", alignItems:"center",
                              background:i%2===0?C.paper:"#F8F5F1",
                              borderLeft:`3px solid ${isI?C.accent:"#4A7CC7"}`,
                            }}>
                              <div>
                                <div style={{fontFamily:sans, fontWeight:700, fontSize:12, color:C.ink}}>{c.label}</div>
                                {pAnual>0 && (
                                  <div style={{height:3, background:C.rule, borderRadius:2, overflow:"hidden", marginTop:4}}>
                                    <div style={{width:`${Math.min((gastado/pAnual)*100,100)}%`, height:"100%", background:over?C.red:(isComp?"#7C3AED":C.green)}}/>
                                  </div>
                                )}
                              </div>
                              <div style={{fontFamily:serif, fontSize:12, fontWeight:900, color:gastado>0?C.red:C.mid, textAlign:"right"}}>{gastado>0?fmt(gastado):"—"}</div>
                              <div style={{fontFamily:serif, fontSize:12, fontWeight:900, color:pAnual>0?C.ink:C.mid, textAlign:"right"}}>{pAnual>0?fmt(pAnual):"—"}</div>
                              <div style={{fontFamily:serif, fontSize:12, fontWeight:900, color:pAnual>0?(over?C.red:C.green):C.mid, textAlign:"right"}}>{pAnual>0?fmt(raf2):"—"}</div>
                            </div>
                          );
                        })}
                        </>
                      )}

                      {/* Footer */}
                      <div style={{padding:"10px 12px", background:C.dark, borderTop:`1px solid #2A2724`}}>
                        <div style={{fontFamily:sans, fontSize:9, color:C.faint, textAlign:"center", letterSpacing:"0.1em"}}>
                          CONTROL DE GASTOS · 2026 · {new Date().toLocaleDateString("es-AR")}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })()}

            </div>
          );
        })()}
      </div>

      {/* ── MODAL REPORTE ── */}
      {reporteImg && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"20px 16px",overflowY:"auto"}} onClick={()=>setReporteImg(null)}>
          <div style={{width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontFamily:sans,fontWeight:700,fontSize:13,color:"#F4F0EB",letterSpacing:"0.08em",textTransform:"uppercase"}}>Reporte generado</span>
              <button onClick={()=>setReporteImg(null)} style={{background:"none",border:"none",cursor:"pointer"}}>
                <Icon name="x" size={18} color="#A09890"/>
              </button>
            </div>
            <img src={reporteImg} style={{width:"100%",borderRadius:10}} alt="Reporte"/>
            <div style={{marginTop:12,padding:"12px 16px",background:"#2A2724",borderRadius:10,textAlign:"center"}}>
              <p style={{fontFamily:sans,fontSize:12,color:"#A09890",marginBottom:4}}>📱 Mantené presionada la imagen para guardarla en tu galería</p>
              <p style={{fontFamily:sans,fontSize:11,color:"#6B6460"}}>Desde ahí podés compartirla por WhatsApp</p>
            </div>
          </div>
        </div>
      )}

      {/* ── SETTINGS MINI MENU ── */}
      {modal==="settings" && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div style={{background:C.bg,borderRadius:"16px 16px 0 0",width:"100%",maxWidth:460,padding:"20px 16px 32px"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:serif,fontSize:20,fontWeight:900,color:C.ink,marginBottom:16}}>Configuración</div>

            {/* ── API key de Anthropic ── */}
            <div style={{background:C.bg,borderRadius:10,border:`1px solid ${C.rule}`,padding:"12px 16px",marginBottom:12}}>
                <div style={{fontFamily:sans,fontWeight:700,fontSize:12,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>
                  Carga desde foto <span style={{color:anthropicKey?C.green:C.amber}}>{anthropicKey?"● Activa":"● Sin configurar"}</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input
                    type="password"
                    placeholder="sk-ant-api03-..."
                    defaultValue={anthropicKey}
                    id="anthropic-key-input"
                    style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1px solid ${C.rule}`,fontFamily:sansR,fontSize:12,color:C.ink,background:C.paper}}
                  />
                  <button onClick={()=>{
                    const val = document.getElementById('anthropic-key-input').value.trim();
                    localStorage.setItem("v1_anthropic_key", val);
                    setAnthropicKey(val);
                    setModal(null);
                  }} style={{padding:"8px 14px",borderRadius:8,border:"none",background:C.dark,color:"#fff",fontFamily:sans,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                    Guardar
                  </button>
                </div>
              </div>

            {/* ── Cuenta / sesión ── */}
            <div style={{background:C.bg,borderRadius:10,border:`1px solid ${C.rule}`,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontFamily:sans,fontWeight:700,fontSize:12,color:C.faint,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:2}}>Cuenta</div>
                {isGuest
                  ? <div style={{fontFamily:sansR,fontSize:13,color:C.mid}}>Modo local · sin sincronización</div>
                  : <div style={{fontFamily:sansR,fontSize:13,color:C.ink}}>{authUser?.email || authUser?.displayName || "Sesión activa"}</div>
                }
                {authUser && !isGuest && syncReady &&
                  <div style={{fontFamily:sansR,fontSize:11,color:C.green,marginTop:2}}>✓ Sincronizado con Firebase</div>
                }
              </div>
              <button onClick={doLogout}
                style={{background:C.tagI,border:`1px solid ${C.rule}`,borderRadius:8,padding:"7px 12px",cursor:"pointer",fontFamily:sans,fontWeight:700,fontSize:12,color:C.accent}}>
                {isGuest ? "Iniciar sesión" : "Cerrar sesión"}
              </button>
            </div>

            {[
              {id:"cats",    icon:"list",     label:"Categorías",              sub:"Agregar, editar o eliminar"},
              {id:"tarjetas",icon:"card",     label:"Tarjetas de crédito",     sub:"Nombre, dígitos y cierre"},
              {id:"presup",      icon:"barchart", label:"Presupuesto mensual",     sub:"Montos por categoría y mes"},
              {id:"presupComp",  icon:"transfer", label:"Presupuesto compartido",   sub:"Total del hogar con tu pareja"},
              {id:"objAhorro",   icon:"star",     label:"Objetivo de ahorro",        sub:"Meta mensual de ahorro/inversión"},
            ].map(({id,icon,label,sub})=>(
              <button key={id} onClick={()=>setModal(id)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.paper,borderRadius:10,border:`1px solid ${C.rule}`,marginBottom:8,cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                <div style={{width:36,height:36,borderRadius:8,background:C.tagD,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Icon name={icon} size={16} color={C.blue}/>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontFamily:sans,fontWeight:700,fontSize:14,color:C.ink}}>{label}</div>
                  <div style={{fontFamily:sans,fontSize:11,color:C.mid,marginTop:1}}>{sub}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {modal==="cats"       && <ModalCats/>}
      {modal==="presupComp" && <ModalPresupComp/>}
      {modal==="objAhorro"   && <ModalObjAhorro/>}
      {modal==="tarjetas" && <ModalTarjetas/>}
      {modal==="presup"   && <ModalPresup/>}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
